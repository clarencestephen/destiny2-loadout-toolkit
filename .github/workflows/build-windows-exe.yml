name: Build Windows .exe

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build setup_gui.exe
        run: |
          pyinstaller --onefile --windowed --name destiny2-loadout-setup `
            --add-data "init_workbook.py;." `
            --add-data "decode_dim.py;." `
            --add-data "add_loadout.py;." `
            --add-data "mod_recommender.py;." `
            setup_gui.py

      - name: Smoke-test built exe exists
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/destiny2-loadout-setup.exe")) {
            Write-Error "Build artifact not produced"
            exit 1
          }
          Get-Item dist/destiny2-loadout-setup.exe | Format-List Name, Length, LastWriteTime

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: destiny2-loadout-setup-windows
          path: dist/destiny2-loadout-setup.exe
          if-no-files-found: error

      - name: Attach to release (only on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/destiny2-loadout-setup.exe
          generate_release_notes: true
