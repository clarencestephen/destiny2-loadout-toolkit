overall_notes:
  - "Collective Obligation exotic pulse: ~5% from Rhulk. Re-rollable via Spoils. Has Vex Crucifix perk."
  - "Deepsight Puzzle: 3 symbols on the obelisk before the first encounter. Find 9 secret rooms with Pyramid switches throughout the raid. Symbols: Pyramid, Give, Darkness (start) + Traveler, Worship, Light (mid) + Stop, Guardian, Kill (late). Shoot wall plate in each matching room. All correct = bonus craftable chest after Rhulk."
  - "Master version: Chaff (no radar) + Shielded Foes. Champions on Glyphkeepers + Hobgoblins."
  - "Soloing: Acquisition + Exhibition mechanics inherently 6-person. Solo flawless essentially impossible without specific cheese."
  - "Symbol literacy: prerequisite for Vow + Dual Destiny + Sundered Doctrine. Memorize the 26."
