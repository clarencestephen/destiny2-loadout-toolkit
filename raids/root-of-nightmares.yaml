      - "1st clear: floater. Lowest mechanic load."
      - "2nd: refuge-maker. Practice reading shoulder-break tattoos."
      - "3rd: light-runner or dark-runner."
      - "4th+: hunted (the chest-aggro specialist)."

# =========================================================================
overall_notes:
  - "Movement exotic in every encounter — Stompees, Lift, Heat Rises, Eager Edge."
  - "Anti-Barrier mandatory for encounters 1, 2, 4."
  - "**Deepsight puzzle** spans the whole raid. 3 hidden rooms in 3 traversal sections. The connection ORDER is determined by 3 flowers near the raid start (left-to-right gives you the sequence). Each room has a seed you connect; the 3 seeds across the 3 rooms must match the flower order. Correct connection: 'Your actions take root…' message appears. Wrong: 'Your spoils have suffered irrecoverable damage.' All 3 correct → reward chest at end with guaranteed Deepsight Resonance weapon."
  - "**Triumph: 'Opaline Shatter'** — full raid with no deaths → exclusive shader."
  - "**Triumph: 'Oxidized Lead'** — loot all 3 hidden chests → exclusive shader."
  - "All loadout: \"\" slots in this file intentionally blank — to be filled via guided review."
