# -------------------------------------------------------------------------

  - order: 4
    slug: nezarec
    name: "Nezarec, Final God of Pain"
    difficulty: hard
    estimated_time: "15-25 min"

    abstract: |
      Two-side arena. Build a Field of Light chain on one side AND a
      Flux of Darkness chain on the other. Survive Overwhelming Energy
      wipes with Light's Refuge or Darkness's Refuge (cued by Nezarec's
      shoulder-break tattoo). One player breaks his chest to absorb
      aggro. Both chains complete → DPS phase. Loop until Final Stand.

    setup: |
      WHAT YOU SEE
      - Arena is split into two halves by Nezarec's central perch.
        LEFT SIDE has Nodes of Splendor (white). RIGHT SIDE has Nodes
        of Decay (dark). (Or reversed — confirm with team's callout
        convention at pull.)
      - Nezarec stands on a central RAISED PLATFORM. He starts in his
        sarcophagus; approaching it triggers him to break out and
        start the encounter.
      - Final seed spots are at the FAR END of each side. These are
        the "stack here for DPS" locations.

      PLATFORM MECHANICS
      - Refuge bubbles spawn AT YOUR FEET when you successfully create
        one. Stand IN the bubble to survive the wipe. The bubble
        persists; the buff on you lasts 14s. Re-approaching the
        bubble re-applies the buff.
      - During DPS phase, do NOT stand on the central raised platform.
        Nezarec teleport-slams there. Move to the final seed spot of
        whichever chain side completed last and stack.
      - Hunted's chest break works at any range — line of sight is
        what matters. Aggro pulls instantly once chest breaks.

      START STATE
      - Encounter doesn't start until anyone approaches Nezarec's
        sarcophagus. Use the buffer time to confirm role assignments,
        side conventions, and refuge-side responsibility.

    callouts:
      - when: "Pre-pull"
        from: lead
        to:   team
        say:  '"Hunted = [name]. Light runner = [name] on LEFT. Dark runner = [name] on RIGHT. Refuge-makers: left = [name], right = [name]. Floater = [name]. Side names: LEFT is LIGHT, RIGHT is DARK."'
        why:  "Locks side conventions so future callouts (Refuge LEFT, Chain RIGHT, etc.) are unambiguous. Side mixing is a wipe."

      - when: "Hunted breaks Nezarec's chest for first time"
        from: hunted
        to:   team
        say:  '"Aggroed — chest broken."'
        why:  "Tells refuge-makers and runners that Nezarec is focused on hunted, so they're safer to mechanic."

      - when: "Nezarec begins Overwhelming Energy windup (back glows)"
        from: any
        to:   team
        say:  '"Windup — shoulders coming."'
        why:  "Refuge-makers prep to read the tattoo. Runners pause to refresh buffs that may convert to refuge."

      - when: "Both Nezarec shoulders broken; tattoo appears"
        from: shoulder-breaker (usually hunted or designated)
        to:   refuge-makers
        say:  '"[LIGHT|DARK] tattoo — need [DARK|LIGHT] refuge!"'
        why:  "Tattoo colour tells refuge-makers which refuge to build. NOTE: Light tattoo means Overwhelming Light is coming, so you need DARKNESS''s Refuge. Always opposite."

      - when: "Refuge created on a side"
        from: refuge-maker
        to:   team
        say:  '"[LEFT|RIGHT] refuge up."'
        why:  "Tells teammates where to run for safety. If only one side gets a refuge, everyone collapses there."

      - when: "Nezarec's Hatred targets a player (psionic blast under feet)"
        from: targeted player
        to:   team
        say:  '"Hatred on me — moving!"'
        why:  "Targeted player must move; hunted re-breaks chest to pull aggro back."

      - when: "Light chain complete"
        from: light-runner
        to:   team
        say:  '"Light done. Stacking final seed left."'
        why:  "Confirms one chain is done; tells team where to stack for DPS."

      - when: "Dark chain complete"
        from: dark-runner
        to:   team
        say:  '"Dark done. Vulnerable incoming."'
        why:  "Both chains complete → orange beam → Nezarec vulnerable. Everyone collapses to final seed spot of last-completed side."

      - when: "Damage phase ending (Nezarec preparing suppression slam)"
        from: any
        to:   team
        say:  '"Re-immune incoming — return to start positions."'
        why:  "Loop reset. Reposition before the suppression slam catches anyone."

    wipe_triggers:
      - "Caught without correct refuge when Overwhelming Light or Overwhelming Darkness fires."
      - "Final Stand timer expires."
      - "Nezarec's Hatred psionic blast launches you off the map (rare, but possible from bad spawn)."

    damage_phase_triggers:
      - "Both Light + Dark chains completed → orange beam from sarcophagus → Nezarec vulnerable for ~15s."

    parallel_timeline:
      - phase: "Pull (encounter triggers when sarcophagus approached)"
        hunted:           "Walk into Nezarec's view → break his chest weak point → aggro pulls onto you."
        light_runner:     "Move to LEFT side's first active Node of Splendor. Start chain."
        dark_runner:      "Move to RIGHT side's first active Node of Decay. Start chain."
        refuge_makers_2:  "Stay loose. Position near INACTIVE nodes on your assigned side."
        floater:          "Add-clear. Colossi, War Beasts, Legionaries spawning."

      - phase: "First Nezarec's Hatred + add wave (~0:30)"
        hunted:           "Keep breaking chest. If aggro drops to another player (Hatred psionic blast under their feet), re-break to pull back."
        light_runner:     "Continue Light chain."
        dark_runner:      "Continue Dark chain."
        refuge_makers_2:  "Pre-position by inactive nodes. Watch Nezarec's back for glow."
        floater:          "Continuous add-clear."

      - phase: "Overwhelming Energy windup (Nezarec's back glows white)"
        hunted:           "Stay aggroed; break shoulders WHEN runners give the signal — too early hides the tattoo."
        light_runner:     "Pause chain at next refresh; your active buff can convert to a refuge."
        dark_runner:      "Same."
        refuge_makers_2:  "Move to your inactive node. Wait for tattoo read."

      - phase: "Shoulders broken — tattoo visible"
        all:              "Read the tattoo colour. LIGHT tattoo → make DARKNESS's Refuge. DARK tattoo → make LIGHT's Refuge. Refuge-makers shoot inactive node with OPPOSITE buff in hand."

      - phase: "Refuge created; wipe fires; survived"
        all:              "Stand in refuge bubble. Re-approach the refuge seed if buff expires before wipe."

      - phase: "Both chains complete → vulnerability"
        all:              "Orange beam from sarcophagus. Stack on final seed spot of the LAST-completed side. Nezarec can't teleport behind you there. DPS for ~15s."

      - phase: "Loop / Final Stand"
        all:              "Nezarec re-immunes with a suppression slam → return to start positions. Final Stand: Nezarec turns black with Resonant energy; race his timer."

    permutations:
      - name: "Standard 1 Hunted / 2 Runners / 2 Refuge / 1 Floater"
        learner_friendly: false
        summary: "Default. One chest-breaker; two side-runners; two refuge-makers (one per side); one floater for ads + backup."
        roles:
          - id: hunted
            count: 1
            does: "Break Nezarec's chest. Take aggro. Stay alive. Re-break if Nezarec retargets."
            loadout: ""
          - id: light-runner
            count: 1
            does: "Left side. Build Field of Light chain."
            loadout: ""
          - id: dark-runner
            count: 1
            does: "Right side. Build Flux of Darkness chain."
            loadout: ""
          - id: refuge-maker
            count: 2
            does: "One per side. Read shoulder-break tattoo. Make matching refuge with OPPOSITE buff + INACTIVE node."
            loadout: ""
          - id: floater
            count: 1
            does: "Ad-clear. Refuge backup if a refuge-maker dies before wipe."
            loadout: ""

      - name: "2 Hunted Tag-Team"
        summary: "Two players alternate chest-breaks so aggro never fully drops. Lighter individual mechanic load."
        best_for: "Master / Contest where Nezarec's Hatred is more punishing."
        roles:
          - id: primary-hunted
            count: 1
          - id: secondary-hunted
            count: 1
            does: "Break chest when primary dies or disengages."
            loadout: ""
          - id: light-runner
            count: 1
          - id: dark-runner
            count: 1
          - id: refuge-maker
            count: 2

      - name: "Stack-DPS Variant"
        summary: "All 6 collapse onto final seed spot of last-completed chain side during vulnerability. Removes Nezarec's teleport-behind threat."
        best_for: "Faster damage phases, fewer cycles."
        roles:
          - id: standard-positions
            count: 6
            does: "Standard mechanics during chain-building. All collapse to final seed location for DPS."
            loadout: ""

    cheese:
      - title: "Back-wall corner DPS"
        detail: |
          During the vulnerability window, hide against the FAR WALL
          off the main platform Nezarec stands on. At that range he's
          limited to projectile attacks — all dodgeable, and the wall
          / terrain blocks most of them. Spam DPS from cover. Trades
          some uptime for near-zero death risk. Best with linear
          fusions, Sleeper, 1000 Voices, or a sword swap.
      - title: "Refuge buff stacking"
        detail: |
          Approach your refuge seed BEFORE the wipe pulse fires to
          extend the 14s buff. You can re-tap the refuge bubble
          multiple times before the pulse arrives if you started
          early enough.

    common_mistakes:
      - "**Shooting an active node for refuge** — biggest wipe cause. Refuge requires INACTIVE node + OPPOSITE buff in hand. Active node = regular buff only."
      - "**Terminology trap**: some guides say 'completed node' (= already chained, now INACTIVE). Other guides say 'inactive node'. Same thing. Active node = has visible aura RING; inactive node = no ring. Refuge needs the NO-RING one."
      - "Hunted disengaging without warning — refuge-makers get hit by Nezarec's Hatred."
      - "Breaking shoulders BEFORE Overwhelming Energy windup — refuge-makers don't see the tattoo."
      - "Standing on the central platform during DPS — Nezarec teleport-slams there."
      - "Side confusion (left = light or right = light). Lock convention at pull and stick to it."

    rewards:
      guaranteed:
        - "1× raid armor or weapon."
        - "Final-encounter chest (separate from per-encounter drops)."
      hidden_chest:
        location: |
          Found by following a root BELOW the one leading to the final
          encounter. The root leads into a floating Pyramid TURBINE.
          Jump onto the open trapdoor above it. Contains the 3rd of 3
          Deepsight puzzle seeds. If all 3 puzzle seeds were connected
          correctly across the raid (see overall_notes), a separate
          reward chest with guaranteed Deepsight Resonance weapon
          spawns at the encounter end.
        rewards:
          - "Spoils of Conquest (×1)"
          - "Final Deepsight puzzle seed"
      potential_drops:
        - "**Conditional Finality** (exotic kinetic shotgun — Stasis + Solar barrels). Most-chased loot from this raid. RNG from final chest."
        - "Acasia's Dejection, Briar's Contempt, Koraxis's Distress (boss-specific raid weapons)."

