  # ====================================================================

  - order: 2
    slug: crypt-security
    name: "Crypt Security"
    difficulty: medium
    estimated_time: "15-25 min"

    abstract: |
      First boss encounter. 3 cylindrical fuses × 2 sides (6 fuses total).
      Split 3/3: light room + dark room. Operator goes to basement, shoots
      4 panels (2 per side) guided by Scanner. After 4 panels = damage
      phase, shoot the indicated upstairs fuse. 6 fuses = encounter done.

    setup: |
      WHAT YOU SEE:
      - Two rooms: LIGHT (white-lit) + DARK (dimmed), separated by closing doors.
      - 3 cylindrical fuses each side (left/middle/right).
      - 4 columns per room with plexiglass bottoms — view into basement.
      - Augment Terminals: 1 each side, plus 1 in basement.
      - Basement: panels on walls (red-glowing). 3 indicator lights per side glow yellow during damage phase.

      PLATFORM MECHANICS:
      - Initial split: 3 LIGHT, 3 DARK.
      - One player picks Operator augment from terminal → goes to basement (shoot red glowing wall panel to drop in).
      - Hacker Vandal spawns → drops Scanner augment.
      - Scanner upstairs uses column glass to view basement panels — sees ONE glowing YELLOW. Calls position.
      - Operator (basement) shoots that yellow panel. Needs 4 panel hits total (2 dark + 2 light).
      - Operator has 1-min timer before Crypt fires kill.
      - Transfer Scanner between dark + light sides via terminal (only 1 augment per terminal).
      - Sentinel Servitor spawns periodically — disables terminals. Kill on sight.
      - 4 panels done → damage phase. Indicator lights on basement pillar show which fuse to shoot upstairs.
      - Scanner (basement) calls fuse to upstairs team. Wrong fuse = wipe.
      - 6 fuses = encounter ends.

      START STATE: rally banner. Operator pickup starts.

    callouts:
      - when: "Operator picked up"
        from: "operator"
        to:   "team"
        say:  '"OP — basement [DARK/LIGHT]."'
        why:  "Side identification."
      - when: "Scanner sees panel"
        from: "scanner"
        to:   "team"
        say:  '"Panel [N] glowing — [DARK/LIGHT]."'
        why:  "Operator shoots that panel."
      - when: "Panel shot"
        from: "operator"
        to:   "team"
        say:  '"Panel [N] HIT — [count]/4."'
        why:  "Progress."
      - when: "Damage phase + fuse indicator"
        from: "scanner"
        to:   "team"
        say:  '"Fuse [L/M/R] — [DARK/LIGHT] side!"'
        why:  "Upstairs team shoots correct fuse."
      - when: "Sentinel Servitor"
        from: "spotter"
        to:   "team"
        say:  '"SENTINEL — burn!"'
        why:  "Terminal restore."

    wipe_triggers:
      - "Operator 1-min timer = death."
      - "Wrong fuse shot during damage phase = wipe."
      - "Sacrifices at terminals (not really applicable — Sentinel just disables)."

    damage_phase_triggers:
      - "4 panels shot (2 dark + 2 light) → damage phase opens → indicator lights show fuses."

    parallel_timeline:
      - phase: "Pull"
        light_team_3: "Push to light room."
        dark_team_3: "Push to dark room."
      - phase: "Operator + panel phase"
        operator: "Basement, shoot 4 panels."
        scanners_2: "Guide via column view."
      - phase: "Augment transfer"
        scanner: "Pass between sides via terminal."
      - phase: "Damage phase"
        upstairs_teams: "Shoot indicated fuse cylinder."
      - phase: "Cycle (×6 fuses)"
        all: "Repeat panel + fuse cycle."

    permutations:
      - name: "Standard 1 Op / 1 Scanner per side"
        learner_friendly: true
        summary: "One Operator (basement) + 2 Scanners (one per side upstairs)."
        roles:
          - id: operator
            count: 1
            does: "Basement, panel shots."
          - id: scanner
            count: 2
            does: "Upstairs, column-view guidance + fuse calls."
          - id: add_clear
            count: 3
            does: "Suppress Overload Captains + Sentinel Servitor + ambient."

    cheese: []

    common_mistakes:
      - "Operator overstays 1-min timer."
      - "Wrong fuse shot during damage phase."
      - "Sentinel disables terminal mid-augment-transfer."

    rewards:
      guaranteed:
        - "1× raid weapon or armor"
      hidden_chest: null
      potential_drops:
        - "Trustee (rapid-fire scout rifle, Solar)"
        - "Legacy's Oath armor — Arms + Legs + Class Item (encounter-specific slots)"

    images:
      overview: ""
      setup: ""
      callouts: ""

    learner_path:
      - "1st: add_clear."
      - "2nd: scanner."
      - "3rd: operator."

  # ====================================================================

  - order: 3
    slug: atraks-1
    name: "Atraks-1, Fallen Exo"
    difficulty: hard
    estimated_time: "20-30 min"

    abstract: |
      Atraks-1 spawns 8 duplicate clones (4 in lab, 4 in orbital space
      station). Scanner finds correct duplicate to attack. Operator
      handles space-pod elevators + Replication orb cleanup (eject via
      airlock or wipe). 4 damage phases + final stand. Sword DPS (Lament)
      recommended.

    setup: |
      WHAT YOU SEE:
      - Laboratory (Clarity Control): 4 space pods to orbital station.
      - Orbital Station (Morning Star): 4 airlocks for Replication ejection.
      - Atraks-1 duplicates: 4 per room (lab: middle pods, red room, yellow room upper+lower; orbital: middle front+back, left, right).
      - Augment Terminals: 3 in lab, 4 in orbital (extra one by space pods).

      PLATFORM MECHANICS:
      - Approach purple orb near space pods → encounter starts.
      - Split 3/3: lab + orbital.
      - Kill 6 Sentinel Servitors (3 per room) to start damage phase.
      - Damage phase: Atraks-1 initiates Extinction Protocol. Scanner sees correct duplicate glowing YELLOW.
      - Kill duplicate → drops Atraks-1 Replication purple orb. 45s timer.
      - Take orb to airlock → Operator shoots red panel to OPEN → walk in → door closes → ejected to space (orb destroyed).
      - Damage phases alternate orbital ↔ lab. 4 phases total before final stand.
      - Scanner augment must be juggled lab/orbital via terminals.
      - Operator can extend orb timer by shooting it overhead (45s reset).
      - Final stand: all 6 in orbital. 8 duplicates spawn at once. Burst correct sequence.

      START STATE: rally banner. Touch purple orb to start.

    callouts:
      - when: "Sentinel Servitor down"
        from: "killer"
        to:   "team"
        say:  '"Sentinel [N/6] down."'
        why:  "Progress to DPS."
      - when: "Atraks duplicate spotted"
        from: "scanner"
        to:   "team"
        say:  '"Atraks [position] — lab/orbital."'
        why:  "Sword team converges."
      - when: "Replication orb dropped"
        from: "killer"
        to:   "team"
        say:  '"REPLICATION — airlock [N]!"'
        why:  "45s timer to eject."
      - when: "Operator opening airlock"
        from: "operator"
        to:   "team"
        say:  '"Airlock [N] OPEN — go!"'
        why:  "Carrier walks in."
      - when: "Augment swap needed"
        from: "self"
        to:   "team"
        say:  '"Scanner to [lab/orbital] — terminal."'
        why:  "Side transfer."
      - when: "Final stand"
        from: "any"
        to:   "team"
        say:  '"FINAL — all 8 duplicates."'
        why:  "Burst correct sequence."

    wipe_triggers:
      - "Replication orb timer to 0 = Atraks spawn-kills team."
      - "Wrong duplicate damaged = no progress, time wasted."
      - "Operator misses augment transfer = no airlock = wipe."
      - "Player stuck in closed airlock = ejected into space."

    damage_phase_triggers:
      - "6 Sentinels destroyed → Extinction Protocol → Scanner-guided duplicate kills."

    parallel_timeline:
      - phase: "Pull"
        lab_team_3: "Push lab."
        orbital_team_3: "Take space pod up."
      - phase: "Sentinel clear"
        all: "Burst 6 Sentinels (3 per room)."
      - phase: "Damage phase 1 (orbital)"
        scanner_orbital: "ID correct duplicate."
        sword_users: "Kill duplicate."
        operator: "Open airlock, eject orb."
      - phase: "Damage phase 2 (lab)"
        scanner_lab: "ID correct duplicate."
        sword_users: "Kill, eject."
      - phase: "Phases 3-4"
        all: "Cycle orbital + lab."
      - phase: "Final stand"
        all: "Stack orbital. Burst 8 duplicates."

    permutations:
      - name: "Standard 3-lab / 3-orbital"
        learner_friendly: true
        summary: "Pre-assigned split with Operator + Scanner roles."
        roles:
          - id: scanner
            count: 2
            does: "One per side. Identify duplicates."
          - id: operator
            count: 2
            does: "One per side. Replication airlock control."
          - id: sword_user
            count: 2
            does: "Lament DPS on correct duplicate."

      - name: "Speed: 2-Lament parallel"
        learner_friendly: false
        summary: "Both teams use Lament + Operator/Scanner roles cycled fast. 2-3 phases."

    cheese:
      - title: "Sniper from across room"
        detail: |
          Some duplicates can be Whisper'd from across the room without
          sword approach. Faster damage if Scanner calls position quickly.

    common_mistakes:
      - "Failing to throw Replication orb in airlock = wipe."
      - "Wrong duplicate damaged = no progress."
      - "Scanner / Operator transfer failure during damage phase."
      - "Standing in airlock when door closes too long = ejected (also a wipe)."

    rewards:
      guaranteed:
        - "1× raid weapon or armor"
      hidden_chest:
        location: |
          HIDDEN CHEST 2 (Orbital Space Walk): During the platforming
          section after Atraks-1, collect from a platform off the
