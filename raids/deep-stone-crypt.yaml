slug: deep-stone-crypt
name: Deep Stone Crypt
activity_type: raid
released:
  expansion: Beyond Light
  year: 2020
roster_status: current
fireteam_size: 6
power_floor:
  normal: 1810
  master: ""           # no Master version
location: "Eventide Ruins → Deep Stone Crypt → Morning Star, Europa"
tags: [fallen, house-of-salvation, exo, taniks, atraks, eyes-of-tomorrow, augment-mechanics]

average_clear_time:
  normal_experienced: "45-60 min"
  normal_learning:    "2-3 hr"

# ========================================================================
overview:
  abstract: |
    Beyond Light raid. AUGMENT-driven design — Operator, Scanner, Suppressor
    roles passed via augment terminals throughout. Three boss encounters
    (Crypt Security, Atraks-1, Taniks) all share the augment paradigm
    but use it differently. Source of Eyes of Tomorrow (exotic rocket
    launcher) + Heritage / Succession / Posterity (top-tier legendaries).

  bosses:
    - name: "Crypt Security"
      encounter: 2
      role: "First encounter — 6-fuse mechanism, Operator-shoots-panels + Scanner-guides"
    - name: "Atraks-1, Fallen Exo"
      encounter: 3
      role: "Mid-boss — duplicate clones; Scanner finds correct, Operator handles Replication"
    - name: "Taniks, the Abomination"
      encounter: 5
      role: "Final boss — nuclear cores + Suppressor stun + Shock Field DPS"

  recurring_mechanics:
    - name: "Augment system (Operator / Scanner / Suppressor)"
      brief: |
        Three colored augments drop from specific Vandals:
          • OPERATOR (red): shoots panels, removes replications, free trapped allies.
          • SCANNER (yellow): identifies highlighted targets (fuses, duplicates, deposit bins).
          • SUPPRESSOR (blue): stuns Taniks via security drones.
        Transferred via Augment Terminals (one augment per terminal at a time).
        Sentinel Servitors disable terminals — kill priority.

    - name: "Frostbite (opening blizzard)"
      brief: |
        10 stacks = death. Removed by Shelter From The Storm bubbles
        (heat domes set up by Fallen).

    - name: "Radiation"
      brief: |
        Encounters 4 + 5. Stacks from holding nuclear cores. 10 = death.
        Pass cores to teammates via interact button to redistribute.

    - name: "Atraks-1 Replication"
      brief: |
        Purple orb dropped by killed duplicate. 45s timer (extendable via
        Operator shooting). MUST be carried to an airlock + ejected or
        Atraks-1 spawn-kills the team.

  role_archetypes:
    - id: operator
      brief: "Holds Operator augment. Panels, replication-clearance, ally rescue."
    - id: scanner
      brief: "Holds Scanner augment. ID glowing-yellow targets."
    - id: suppressor
      brief: "Taniks-fight specific. Routes through security drones to stun boss."
    - id: nuke_carrier
      brief: "Carries radiation-stacking nuclear cores in Taniks fights."

  sherpa_playbook:
    - "Pre-pull: assign initial augment roles (1 Op, 1 Scanner per team)."
    - "Eyes of Tomorrow: ~5% drop from Taniks, can re-roll with Spoils."
    - "Solo flawless: difficult — augment juggling requires teamwork. Some bosses cheese-soloable."

  loadout_general:
    weapons:
      - "Burst DPS: Whisper, Sleeper, Linear, Eyes of Tomorrow itself."
      - "The Lament sword for Atraks-1 (high single-target DPS in tight spaces)."
      - "Anti-Champion mods for Overload Captains, Brigs."
    armor_stats:
      - "Stompees / Lift / Heat Rises for orbital space walk."
      - "Health for Brig damage."
    common_exotics:
      - "Hunter: Stompees (space walk), Celestial Nighthawk."
      - "Titan: Cuirass of the Falling Star, Heart of Inmost Light."
      - "Warlock: Well of Radiance, Phoenix Protocol."

  common_mistakes:
    - "Augment transferred to wrong room — encounter stalls."
    - "Sentinel Servitor ignored — terminals disabled."
    - "Atraks-1: Replication orb not thrown into airlock = mass wipe."
    - "Taniks: wrong deposit bin = instant death."
    - "Taniks final stand: 5 teleports without kill = instant team death."

