      - "2nd: scanner."
      - "3rd: operator."

  # ====================================================================

  - order: 4
    slug: descent
    name: "Surviving the Descent (Rapture)"
    difficulty: hard
    estimated_time: "15-25 min"

    abstract: |
      Pre-Taniks encounter. Taniks Reborn looms. Deposit 6 nuclear cores
      in correct deposit bins (Scanner-guided). Operator shoots red
      panels for cores. Suppressor stuns Taniks at security drones.
      Failure = nuclear detonation. Then escape pod sprint.

    setup: |
      WHAT YOU SEE:
      - Command deck of Rapture (orbital station crashing).
      - 4 nuclear core terminals (far L+R walls + L+R upper catwalks).
      - 3 deposit boxes spread around the room.
      - 3 security drones (1 mid floor + 2 elevated L+R).
      - Taniks looming, immune.

      PLATFORM MECHANICS:
      - Approach Taniks to start.
      - Operator picks Operator augment, alarm sounds → shoot red panel near nuclear core terminal to spawn cores (2 normally; 3 if missed).
      - Cores: Radiation debuff on carrier. 10 = death. Pass via Interact to redistribute.
      - Scanner identifies WHICH deposit boxes glow yellow.
      - Carriers deposit cores at correct boxes (wrong = nuclear detonation = wipe).
      - Taniks turns deposit boxes OFFLINE periodically.
      - Suppressor (from Suppressor Vandal) → stand under one of 3 security drones → shoot Taniks → STUN.
      - 6 deposit cycles → Crypt AI deactivates protocol → hatch opens.
      - Sprint to escape pod via lower hallways. Taniks chases with Molten Welder.
      - Escape pod doors close → encounter ends.

      START STATE: rally banner. Approach or shoot Taniks to start.

    callouts:
      - when: "Alarm + core panel shot"
        from: "operator"
        to:   "team"
        say:  '"Panel HIT — cores spawning [N]."'
        why:  "Cores ready for pickup."
      - when: "Scanner identifies bins"
        from: "scanner"
        to:   "team"
        say:  '"Bins [N1] + [N2] — deposit there."'
        why:  "Pre-assign carriers."
      - when: "Carrying core"
        from: "self"
        to:   "team"
        say:  '"Core — rad [N]."'
        why:  "Pass cores to teammates if stacking."
      - when: "Boxes offline"
        from: "spotter"
        to:   "team"
        say:  '"OFFLINE — Suppressor stun!"'
        why:  "Triggers stun phase."
      - when: "Drone stun done"
        from: "suppressor"
        to:   "team"
        say:  '"STUNNED — deposit now!"'
        why:  "Carriers deposit."
      - when: "Boxes deposited"
        from: "carrier"
        to:   "team"
        say:  '"[N/6] deposited."'
        why:  "Progress."

    wipe_triggers:
      - "Radiation 10 = death."
      - "Wrong deposit box = nuclear detonation."
      - "Cores not deposited in time = explode = wipe."
      - "Operator missing panel shot = 3 cores spawn (worse spread)."

    damage_phase_triggers: []  # no DPS phase — puzzle encounter

    parallel_timeline:
      - phase: "Pull"
        all: "Approach Taniks. Augments distributed."
      - phase: "Per cycle"
        operator: "Shoot red panel for cores."
        scanner: "ID correct deposit bins."
        carriers_2: "Pick up cores, manage radiation."
        suppressor: "Stand drone, stun Taniks when boxes go offline."
        depositor: "Drop cores in correct bins."
      - phase: "6 deposits"
        all: "Cycle 6 times."
      - phase: "Escape pod sprint"
        all: "Run lower hallways. Avoid Taniks Molten Welder."

    permutations:
      - name: "Standard 3-role with floaters"
        learner_friendly: true
        summary: "Op + Scanner + Suppressor as dedicated; 3 carriers/floaters."
        roles:
          - id: operator
            count: 1
            does: "Panel shots."
          - id: scanner
            count: 1
            does: "Deposit bin ID."
          - id: suppressor
            count: 1
            does: "Drone routing + Taniks stun."
          - id: carrier
            count: 3
            does: "Core management + deposits."

    cheese: []
    common_mistakes:
      - "Wrong deposit bin = full team death."
      - "Radiation cascading because nobody passes cores."
      - "Suppressor without drone position = no stun."

    rewards:
      guaranteed:
        - "1× raid weapon or armor"
      hidden_chest: null
      potential_drops:
        - "Posterity (precision hand cannon, Arc)"
        - "Legacy's Oath armor — Chest + Arms + Class Item (encounter-specific slots)"

    images:
      overview: ""
      setup: ""
      callouts: ""

    learner_path:
      - "1st: carrier."
      - "2nd: operator / scanner."
      - "3rd: suppressor."

  # ====================================================================

  - order: 5
    slug: taniks-abomination
    name: "Taniks, the Abomination (final boss)"
    difficulty: hard
    estimated_time: "20-30 min"

    abstract: |
      Final boss. 3 areas (spawn / blue / orange). Per cycle: Taniks at
      one area → shoot 2-4 nuclear cores from his booster jets (before
      Turbulent Detonation wipe). Scanner finds correct deposit bins
      (6 total across 3 areas, 2 each). Suppressor stuns via security
      drones (3 per area). 4 cores deposited → Shock Field DPS.

    setup: |
      WHAT YOU SEE:
      - 3 areas: spawn, blue, orange.
      - 6 deposit bins (2 per area).
      - 9 security drones (3 per area).
      - Augment Terminals: 3 (one per area).

      PLATFORM MECHANICS:
      - Approach wreckage to start.
      - Taniks flies between 3 areas.
      - At each area, his booster jets become vulnerable. Shoot for 2-4 nuclear cores.
      - Turbulent Barrage (purple light columns from above) — preview of Turbulent Detonation wipe attack.
      - 2-4 cores collected → stops Turbulent Detonation.
      - Taniks detains players in spheres. Operator (red augment) shoots sphere to free.
      - Scanner (yellow) identifies which 2 deposit bins glow yellow this cycle.
      - Carriers deposit cores at correct bins (Radiation 10 = death).
      - Suppressor walks through 3 drones in any area to charge, shoots Taniks (glows blue) to STUN.
      - Suppressor recommendation: wait for Taniks to encase players TWICE before stunning third.
      - 4 cores deposited → Shock Field appears. Position between 2 spheres in field.
      - DPS Taniks while staying in field (too close = Arc damage; too far = rotating debris death).
      - Field push-out: re-enter carefully.
      - 3 damage phases until enrage.
      - Final stand: Taniks teleports between spawn/blue/orange. 5 teleports without kill = instant team death.

      START STATE: rally banner. Approach Taniks wreckage to start.

    callouts:
      - when: "Taniks at area"
        from: "tracker"
        to:   "team"
        say:  '"Taniks [SPAWN/BLUE/ORANGE]."'
        why:  "Converge for booster shoot."
      - when: "Cores dropped"
        from: "any"
        to:   "team"
        say:  '"4 CORES — pick + go."'
        why:  "Pickup cue."
      - when: "Scanner bins"
        from: "scanner"
        to:   "team"
        say:  '"Bins [N1] + [N2] — [area]."'
        why:  "Deposit targets."
      - when: "Player detained"
        from: "detained"
        to:   "team"
        say:  '"DETAINED [direction] — Operator!"'
        why:  "Operator free with shoot."
      - when: "Suppressor drone progress"
        from: "suppressor"
        to:   "team"
        say:  '"Drones [N/3] — third when ready."'
        why:  "Pacing for stun."
      - when: "Stun done"
        from: "suppressor"
        to:   "team"
        say:  '"STUNNED — deposit!"'
        why:  "Carriers go."
      - when: "Shock Field DPS open"
        from: "any"
        to:   "team"
        say:  '"FIELD — between spheres!"'
        why:  "Stand correct position."
      - when: "Final stand teleports"
        from: "tracker"
        to:   "team"
        say:  '"Taniks [SPAWN/BLUE/ORANGE] — [N/5] teleports!"'
        why:  "5 teleports = instant team death."

    wipe_triggers:
      - "Turbulent Detonation (not enough cores collected)."
      - "Radiation 10 = death."
      - "Wrong deposit bin = death."
      - "5 final-stand teleports without kill = instant team death."
      - "Too close to Shock Field spheres = Arc damage."
      - "Too far from field center = rotating debris death."

    damage_phase_triggers:
      - "4 cores deposited correctly → Shock Field opens → DPS until field times out / Taniks resists."

    parallel_timeline:
      - phase: "Pull"
        all: "Engage Taniks at spawn."
      - phase: "Cycle (per area)"
        booster_shooters: "Shoot Taniks's jets for cores."
        operator: "Free detained players."
        scanner: "ID deposit bins."
        suppressor: "Walk drones (wait for 2nd encase, then stun)."
        carriers: "Deposit cores."
      - phase: "DPS (Shock Field)"
        all: "Position between spheres in field. Burst Taniks."
      - phase: "Cycle / Final stand"
        all: "3 damage phases until enrage. Final stand = teleport tracking."

    permutations:
      - name: "Standard 1-Op / 1-Scanner / 1-Supp / 3-carriers"
        learner_friendly: true
        summary: "Pre-assigned augment roles. Floaters carry cores."
        roles:
          - id: operator
            count: 1
            does: "Sphere-free rescues."
          - id: scanner
            count: 1
            does: "Deposit bin calls."
