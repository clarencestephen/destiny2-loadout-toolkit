      - Blizzard arena with 6 heat-bubble shelters (chain through the storm).
      - 6 Fallen Pikes in the first shelter (triumph: transport all to last).
      - Lamps + Web Mines mark the route.
      - Final shelter: Brigs + Dark Council Guards.

      PLATFORM MECHANICS:
      - Outside bubble = Frostbite stacks. 10 = death.
      - Bubble entry = Shelter From The Storm + clears Frostbite.
      - Clear shelter adds = checkpoint (respawn there).
      - Sparrows speed traversal.

