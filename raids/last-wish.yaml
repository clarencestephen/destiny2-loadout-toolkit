  # ====================================================================

  - order: 6
    slug: heart-escape
    name: "The Heart of Riven (Fate's Chosen escape)"
    difficulty: hard
    estimated_time: "10-15 min"

    abstract: |
      Post-Riven kill. One player is chosen Fate's Chosen → carries Heart
      out of Riven's mouth. 15s timer; at 0, anyone NEAR Heart-holder is
      sucked INTO Heart realm. Carry Heart all the way back through the
      raid to the Vault deposit point. Heart holders inside grab Taken
      Strength orbs to delay rip timer.

    setup: |
      WHAT YOU SEE:
      - Inside Riven's mouth post-kill: Heart of Riven on the ground.
      - Path: Riven's mouth → back of room → left → right → blight crossing room → left → Vault → Stairs deposit.

      PLATFORM MECHANICS:
      - Fate's Chosen has 15s rip timer. AURA around them protects from Creeping Darkness.
      - Stay close to Heart holder ALL THE TIME (except last 3-5s of rip timer).
      - When timer hits 0: anyone in radius = sucked into Heart realm.
      - Inside Heart realm: collect Taken Strength orbs (max 2 each — like Morgeth). Last orb resets rip timer (once per holder).
      - Mights of Riven appear inside Heart. Kill before plate slam.
      - Route: Riven's mouth → out → left door → right door → blight room (cross via platforms or just heal) → right door → left → Vault → Trees or Rocks open → tunnel to Stairs → up stairs → deposit Heart at small room.

      START STATE: Riven dead. Heart spawns. Fate's Chosen begins.

    callouts:
      - when: "Heart picked up"
        from: "carrier"
        to:   "team"
        say:  '"HEART — 15."'
        why:  "Timer broadcast."
      - when: "Timer at 5s"
        from: "carrier"
        to:   "team"
        say:  '"5 — back!"'
        why:  "Team backs off."
      - when: "Sucked in"
        from: "absorbed"
        to:   "team"
        say:  '"IN HEART — finding Strength."'
        why:  "Coordinate inside."
      - when: "Approaching Vault"
        from: "carrier"
        to:   "team"
        say:  '"Vault next — [Trees/Rocks] open!"'
        why:  "Route confirmation."

    wipe_triggers:
      - "Creeping Darkness 10 stacks (outside aura)."
      - "Heart drops too long without pickup."
      - "Mights of Riven slam plate inside Heart realm."

    damage_phase_triggers:
      - "Heart deposited at Stairs → raid complete + loot chests spawn."

    parallel_timeline:
      - phase: "Pull (Riven dies)"
        fate_chosen: "Heart picked up."
        team: "Run out of mouth, stay close until ~3s on timer."
      - phase: "Cycle (every 15s)"
        fate_chosen: "Move + count timer."
        absorbed_players: "Collect Taken Strength inside."
      - phase: "Vault entry"
        all: "Route through Vault to Stairs."
      - phase: "Deposit"
        carrier: "Deposit Heart → raid complete."

    permutations:
      - name: "Standard escape route"
        learner_friendly: true
        summary: "Fate's Chosen rotates as each gets sucked. Route is fixed."
        roles:
          - id: heart_carrier
            count: 1
            does: "Rotates among players. Manages timer."
          - id: support
            count: 5
            does: "Stay close, run with carrier, clear ambient."

    cheese: []

    common_mistakes:
      - "Heart holder stops too far from team — Creeping Darkness kills team."
      - "Inside Heart: 3rd Strength = death (like Morgeth)."
      - "Route confusion at Vault — go to open room."

    rewards:
      guaranteed:
        - "Final raid chest opens after deposit"
        - "Ethereal Keys (from Wish 1 + others) open additional chests under Awoken statues"
      hidden_chest: null
      potential_drops:
        - "1000 Voices (exotic) — random chance"
        - "Last Wish armor + weapons"

    images:
      overview: ""
      setup: ""
      callouts: ""

    learner_path:
      - "1st: support — learn route."
      - "2nd: heart_carrier."

