overall_notes:
  - "1000 Voices exotic fusion rifle: ~5% drop from Riven, can re-roll via Spoils."
  - "Wall of Wishes (21-button puzzle near Kalli): activate Wish 1 (Ethereal Key, once/account) at minimum. See encounter notes for full wish list."
  - "Wishes 4-7 teleport to specific encounters — useful for farming."
  - "Master version: NOT available for this raid. Petra's Run (Wish 13) is the closest 'hard mode' — 1 death = orbit."
  - "Challenges: All 9 plates (Kalli), No ranged blast (Shuro Chi), Keep 4 Ogres alive (Morgeth), Mights in rooms (Vault), Each player different eye (Riven)."
  - "Wish-Ender exotic bow (from Shattered Throne dungeon, not this raid) needed for Corrupted Eggs (Wish 14)."
  - "Riven cheese: the wall-hug skip is the standard way to clear. Legitimate route is teaching-rare."
  - "Soloing: Heart escape requires multiple players to absorb Strength inside Heart — soloing it requires very high skill / specific cheese."
