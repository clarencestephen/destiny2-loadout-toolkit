  # ====================================================================

  - order: 7
    slug: atheon
    name: "Atheon, Time's Conflux (final boss)"
    difficulty: hard
    estimated_time: "15-25 min"

    abstract: |
      Final boss. Atheon randomly teleports 3 players to PAST (Mars) or
      FUTURE (Venus). Inside team: 1 Relic holder + 2 Oracle killers (6
      red/yellow Oracles to destroy in 30s). Outside team: 3 players hold
      Atheon's aggro + DPS. Inside team returns through correct portal.
      DPS phase: 6 stack + Well + burst Atheon. Final stand at 30%.

    setup: |
      WHAT YOU SEE:
      - Atheon's Throne room with 2 portals (Venus right, Mars left).
      - Center platform with Aegis Relic.
      - Atheon (large Vex Conflux) at the back.

      PLATFORM MECHANICS:
      - Atheon teleports 3 random players (or specific 3 in some perms) into a portal — past or future.
      - Inside team:
        • Past (Mars): 3 Descendant Hobgoblins (Relic instant-kills them; team don't shoot or shields activate).
        • Future (Venus): 2 Precursor Goblins + 1 Praetorian (very tanky; grenades stagger).
        • 6 red/yellow Oracles spawn — kill all (Relic Super smash works, or 1-shot with jump+heavy).
        • "Marked by the Void" debuff clouds vision. Aegis cleanse removes.
        • 30s timer to kill enemies + Oracles → return through correct portal.
      - Outside team:
        • 3 players stay with Atheon. Atheon attacks them (Detains them on Master).
        • Burst Atheon's HP.
      - When inside team returns: all 6 stand on center plate → DPS phase.
      - DPS phase: ~30-40s window. Drop Well + Bubble. Burst with Cuirass / Celestial / Whisper.
      - Cycle repeats. ~3 phases typical normal-skill.

      START STATE: rally banner outside. Walk in to start. First teleport ~30s in.

    callouts:
      - when: "Teleport — who's inside"
        from: "first to see"
        to:   "team"
        say:  '"[name1, name2, name3] inside [Venus/Mars]."'
        why:  "Outside team knows who's missing."
      - when: "Inside team — planet ID"
        from: "diver"
        to:   "team"
        say:  '"VENUS!"' # or "MARS"
        why:  "Outside team prepares correct portal for return cleanse."
      - when: "Oracle position inside portal"
        from: "spotter"
        to:   "team"
        say:  '"Oracle [position] — Relic on it."'
        why:  "Relic Super = 1-shot Oracle."
      - when: "Returning"
        from: "diver"
        to:   "team"
        say:  '"COMING OUT — portal!"'
        why:  "Cleanse + ready DPS."
      - when: "DPS open"
        from: "any"
        to:   "team"
        say:  '"DAMAGE — WELL!"'
        why:  "Stack, Well, Bubble, burst."
      - when: "Final stand (~30% HP)"
        from: "any"
        to:   "team"
        say:  '"FINAL — burn!"'
        why:  "Push through."

    wipe_triggers:
      - "Inside team timer expires → all inside die."
      - "Oracle phase mismanaged → cascading Marks."
      - "Aegis dropped > 5s = Curse of the Aegis team kill."
      - "Atheon enrages (~7-8 min)."

    damage_phase_triggers:
      - "All 6 stand on center plate after inside team returns → ~30-40s DPS."

    parallel_timeline:
      - phase: "Pull"
        all: "Engage Atheon. 3 dive on first teleport."
      - phase: "Inside portal (~0:30)"
        relic_diver: "Pick up Aegis, kill planet's enemies."
        oracle_killers_2: "Destroy 6 Oracles in order. Relic Super or jump+heavy."
      - phase: "Return + cleanse"
        diver: "Aegis cleanse on team blackness."
      - phase: "DPS (~30-40s)"
        all: "Stack, Well, Bubble, burst."
      - phase: "Reset"
        all: "Cycle teleports."

    permutations:
      - name: "Standard 3/3 split"
        learner_friendly: true
        summary: "3 inside (1 Relic + 2 Oracle), 3 outside (Atheon DPS)."
        roles:
          - id: inside_relic
            count: 1
            does: "Inside portal, holds Aegis."
          - id: inside_oracle
            count: 2
            does: "Inside portal, kill enemies + Oracles."
          - id: outside_dps
            count: 3
            does: "Stay with Atheon, burst HP, prep for return DPS."

      - name: "Speed: Celestial Nighthawk one-shot"
        learner_friendly: false
        summary: |
          Hunter with Celestial Nighthawk + Star-Eater Scales can hit
          Atheon for 8+ million per Super (with Well + Cuirass Crash combo).
          1-2 phase clears common.
        best_for: "Endgame teams."

      - name: "Atheon Cheese (D2 jail)"
        learner_friendly: false
        summary: |
          (D1 era) Pushing Atheon off the edge via grenade was an old
          cheese. Mostly patched in D2. Some teams still use specific
          knockback strategies on Master.

    cheese:
      - title: "Edge knockback"
        detail: |
          Specific knockback grenades + sword pushes can shove Atheon
          off the platform in certain D2 reprises. Patched on most
          difficulty tiers — verify with current sandbox."

    common_mistakes:
      - "Inside team picks up Relic on Mars but doesn't burst Hobgoblins fast — shields up, wasted timer."
      - "Outside team forgets to keep distance from Atheon Detain bubbles."
      - "Not Well-ing DPS phase — Atheon shrugs sustained damage."
      - "Confusing Past vs Future portal — return through WRONG one = team wipe."

    rewards:
      guaranteed:
        - "1× raid weapon or armor"
        - "Final boss chest (extra roll)"
      hidden_chest: null
      potential_drops:
        - "**Vex Mythoclast** (exotic fusion rifle, Solar) — RNG drop from Atheon chest. The OG raid exotic."
        - "Praedyth's Revenge (sniper rifle, Kinetic)"
        - "Corrective Measure (machine gun, Void)"
        - "Hezen Vengeance (rocket launcher, Solar)"
        - "Vault of Glass armor (random slot)."
        - "Corrective Measure (LMG)"
        - "VoG armor (full set)"
        - "Time-Worn Spire shader"

