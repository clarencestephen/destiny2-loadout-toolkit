  - order: 5
    slug: the-witness
    name: "The Witness"
    difficulty: hard
    estimated_time: "20-40 min"

    abstract: |
      Final encounter. Fight the Witness directly. Reads its hand
      attacks to identify which resonance to collect, then break its
      armband-colored arms. Each broken arm grants Glyphbreaker; with
      that buff, shoot one of the Witness's chest glyphs to cleanse
      resonance + progress toward damage phase. All 6 glyphs broken =
      central plate rises = DPS window.

    setup: |
      WHAT YOU SEE
      - Wide circular arena. **The Witness** stands at the back wall.
      - 6 GLYPHS arranged in a row across the Witness's chest.
      - 3 active **HANDS** at any time:
          • SKY HAND — Resonant Outburst (triangle floor AoE).
          • FLOOR HAND — Resonant Seekers (circle swarm).
          • SIDE HAND — Wrathful Disarray (horizontal beam).
      - Each hand has a glowing ARMBAND in a colour (green/yellow/red).
        Colour = which resonance is needed to break it.
      - Central CIRCULAR ORGANIC PLATFORM — rises during damage phase.

      PLATFORM MECHANICS
      - To pick up resonance: STAND in a hand's attack zone for ~2
        seconds (you'll hear a droning sound). Avoid these in normal
        play — Glyphbreakers deliberately stand in them.
      - To BREAK a hand: with the matching resonance, return to the
        attack zone of the hand whose armband matches that colour,
        and shoot the armband. The hand explodes; you get
        **Glyphbreaker** buff.
      - To CLEANSE resonance: walk to the central organic platform,
        shoot one of the Witness's 6 chest glyphs. Glyph disappears
        + your resonance clears. Required: you DIE if you carry
        resonance too long.
      - Spike test: after destroying a hand, a glowing hand may signal
        a test. Pyramid spikes spawn in front of the Witness. The team
        must DESTROY spikes in a pattern matching the attack hand's
        shape (triangle/circle/square). Wrong = lose jump for 5
        seconds + ground-energy wave kills anyone not in the air.

      START STATE
      - Encounter starts the moment players approach the Witness's
        platform.

    callouts:
      - when: "Pre-pull"
        from: lead
        to:   team
        say:  '"Glyphbreakers = [3 names]. Add-clear = [3 names]. Glyphbreakers take HAND assignments: [name1] sky, [name2] floor, [name3] side."'
        why:  "Each Glyphbreaker permanently owns one of the 3 hand types. Reduces confusion about who's reading what."

