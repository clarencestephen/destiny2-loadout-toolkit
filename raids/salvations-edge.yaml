      - when: "Hand broken"
        from: glyphbreaker
        to:   team
        say:  '"[Sky | Floor | Side] hand DOWN — Glyphbreaker active."'
        why:  "Tells team one hand attack is now offline + this player will cleanse at central glyph."

      - when: "Spike test triggered"
        from: any
        to:   team
        say:  '"SPIKES — need [TRIANGLE | CIRCLE | SQUARE]!"'
        why:  "Witness winds up a spike test; correct-shape pattern dissolves the spikes; failure = ground-energy wave."

      - when: "5th glyph being broken (last glyph imminent)"
        from: lead
        to:   team
        say:  '"5th glyph — converge to central plate."'
        why:  "Once 6th glyph breaks, central plate rises and damage phase starts. Be on the plate already."

