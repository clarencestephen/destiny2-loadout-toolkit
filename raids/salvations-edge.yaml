            count: 4

      - name: "Rotating Glyphbreakers"
        summary: "No fixed hand assignments. Whoever picks up a resonance first goes for the matching hand. More flexible, requires comms-tight team."
        best_for: "Experienced fireteams comfortable with on-the-fly callouts."
        roles:
          - id: rotating
            count: 6
            does: "Anyone can be Glyphbreaker. Read hands, pick up resonance, break matching hand. Call ownership out loud."
            loadout: ""

    cheese:
      - title: "Stack Glyphbreakers near final glyph for instant DPS open"
        detail: |
          When 5 glyphs are broken and the last Glyphbreaker is en
          route to break the 6th, the OTHER 5 should already be on
          the central plate ready to DPS. Saves 3-5 seconds of
          repositioning, which is the difference between making it
          to Final Stand in 4 phases vs 5.

    common_mistakes:
      - "Glyphbreaker forgets to cleanse → dies to resonance timer."
      - "Glyphbreaker reads wrong-colour armband → picks up wrong shape → can't break hand."
      - "**Same-color trap (verified Pass 2)**: a hand's armband NEVER matches the resonance it itself spawns. The FLOOR hand (spawns Spherical) won't show yellow. The SKY hand (spawns Pyramidal) won't show green. The SIDE hand (spawns Hexahedral) won't show red. So to break any hand you must grab resonance from a DIFFERENT hand's zone — never the one in front of you."
      - "Add-clear standing in Resonant Seekers (floor swarm) → accidentally picks up Spherical resonance → also dies to timer if not cleansed."
      - "Spike test ignored → instant team wipe."
      - "Spike-test pattern: shape matches the LAST destroyed hand. Text on screen reads 'The Witness tests you...' — that's the cue."
      - "Final Stand: trying for a 2nd damage phase — there isn't one. Burst NOW or wipe."

    rewards:
      guaranteed:
        - "1× raid armor or weapon."
        - "Final-encounter chest (separate from per-encounter drops)."
      hidden_chest: null
      potential_drops:
        - "**Euphony** (exotic linear fusion rifle, Strand) — most-chased loot. RNG drop from final chest."
        - "Summum Bonum (sword, Arc)"
        - "Nullify (pulse rifle, Solar)"
        - "Critical Anomaly (sniper rifle, Stasis)"

    master_challenge:
      name: "Coordinated Efforts"
      requirement: |
        All 6 Witness glyphs must be broken within a few seconds of
        each other. All 6 fireteam members need to obtain the
        Glyphbreaker buff first (shoot an appendage with a buff that
        matches its armband), then fire on glyphs simultaneously.
        Side effect: makes Master easier — only 1 pair of Subjugators
        per phase. Tradeoff: no opportunity to cleanse incorrect
        Resonance before DPS opens.
      enforced_on: "Master only"

