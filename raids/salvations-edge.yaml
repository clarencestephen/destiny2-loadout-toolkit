      hidden_chest: ""

    learner_path:
      - "1st clear: Outside (no time pressure, more logical work)."
      - "2nd: Inside, but ONLY after coaching on the 'don't form your own shape' rule."
      - "3rd+: try the Selection Trick to pre-pin yourself into your strongest role."

