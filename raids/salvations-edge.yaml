# raids/salvations-edge.yaml
# Format v3 — setup + callouts + parallel timeline + permutations + cheese
# + mistakes + rewards + learner_path per encounter.
# Sourced primarily from destinypedia + scraped boss pages (The Witness,
# Herald of Finality). Game-name terminology throughout.
# Loadout fields blank — to be filled via guided review.
#
# PASS 2 (multi-source synthesis, 2026-05): mechanics cross-checked against
# gamerant + pcgamesn + sportskeeda + shacknews.
# Key verifications:
#   • Verity hand-arm mapping: UP=Spherical (yellow), DOWN=Pyramidal
#     (green), SIDEWAYS=Hexahedral (red). Bracelet NEVER shows its own
#     color (e.g., spherical-circle hand never glows yellow itself).
#   • Witness Glyphbreaker: "The Witness tests you..." text → dark nodes
#     arranged to match shape of LAST destroyed hand.
#
# PASS 2 RE-PASS (2026-05-27, blueberries authoritative for loot+challenges):
#   • Loot tables: ALL 5 encounters had incorrect potential_drops in
#     Pass-1. Substratum was listing E3/E5 weapons; Witness was over-
#     inclusive. Fixed against blueberries.gg/weapons/salvations-edge-loot-table.
#   • Master Challenges added (new master_challenge: block per encounter):
#     Scenic Route / At Capacity / Balanced Diet / Varied Geometry /
#     Coordinated Efforts. Per blueberries.gg/leveling/salvations-edge-challenges.
#   • Final Stand at ~10% HP, chest glows yellow.
#   • 3-stack Resonance cap (4th = instant death) confirmed across sources.
# Added: image slots per encounter (reserved for Discord upload).

slug: salvations-edge
name: "Salvation's Edge"
activity_type: raid
released:
  expansion: The Final Shape
  year: 2024
roster_status: current
fireteam_size: 6
power_floor:
  normal: 1965
  master: 2020

location: "The Pale Heart of the Traveler — the Witness's Monolith"
tags: [light, dark, shapes, resonance, witness, sol-divisive, dread, scorn, taken]

average_clear_time:
  normal_experienced: "60-90 min"
  normal_learning: "3-6 hr"
  master: "90-120 min"

# =========================================================================
overview:
# =========================================================================
  abstract: |
    The Final Shape's capstone raid. The hardest raid in D2 since Last
    Wish — 19-hour world-first race, 9-hour Verity encounter, lowest
    day-one clear rate ever. Built around a Resonance shape system
    (Pyramidal / Spherical / Hexahedral = triangle / circle / cube)
    that you collect by picking up shapes from rooms, depositing into
    conductors and chests. The Witness himself is fought directly in
    the final encounter.

  bosses:
    - name: "Threshold Sentinel"
      encounter: "1 (Substratum), 3 (Repository)"
      role: "Tormentor mini-boss. Kill drops Stolen Favor buff (Repository only)."
    - name: "Herald of Finality"
      encounter: 2
      role: "Mid-raid boss. Summons Called to Reckoning, drops Stolen Favor."
    - name: "Splintered Curator"
      encounter: 4 (Verity)
      role: "Hive Knight inside the Verity realm — kill drops shapes for Inside team."
    - name: "The Witness"
      encounter: 5 (final)
      role: "Endboss. Glyphbreaker mechanic, Final Shape wipe, shape tests."

  recurring_mechanics:
    - name: "Resonance shapes"
      brief: |
        Three shapes exist: **Pyramidal Resonance** (triangle),
        **Spherical Resonance** (circle), **Hexahedral resonance**
        (cube). Each spawns from a glowing resonance spot with the
        matching shape at its centre. Walk to the spot, pick it up.
        Maximum 3 stacks at a time — picking up a 4th instantly kills
        you. Each stack also has its own countdown timer; if it expires
        on you, you die.

    - name: "Resonant Conductor"
      brief: |
        Obelisk-shaped object with a glowing centre. Stand a few
        steps away and shoot the centre once to ARM it (a rippling
        aura appears). Now the next charge that arrives at your
        connected plate while you stand on the plate will lock the
        conductor down — consuming 1 stack of resonance from your
        inventory. Wrong shape in conductor = instant wipe (Herald
        onwards).

    - name: "Circuit plates"
      brief: |
        Glowing floor plates connected by orange wire-lines to
        other plates or conductors. Step ON the plate the moment
        the charge enters — you'll see a rapidly-shrinking circular
        aura on it. Step off too early or too late, the charge is
        lost. Plate-bouncing keeps the conductor powered and resets
        the wipe timer.

    - name: "Final Shape Looming"
      brief: |
        The encounter wipe timer (encounters 1, 2, 3, 5). Visible at
        top of screen. Counts down. Completing the encounter's main
        loop (depositing resonance / locking conductors / breaking
        glyphs) extends it. Letting it hit 0 = instant team wipe.

    - name: "The Witness's hand attacks"
      brief: |
        Three attacks recur throughout the raid:
          • **Resonant Outburst** — TRIANGULAR area on the ground.
            Stand in it long enough = pick up Pyramidal Resonance.
          • **Resonant Seekers** — CIRCULAR area, swarm of seeker
            projectiles. Stand in long enough = Spherical Resonance.
          • **Wrathful Disarray** — RECTANGULAR beam from the side.
            Stand in long enough = Hexahedral resonance.
        In normal encounters, AVOID these. In the Witness fight,
        Glyphbreakers DELIBERATELY stand in them to collect resonance.

  role_archetypes:
    - id: conductor
      brief: "Encounters 1-3. Locks down a Resonant Conductor by arming it + stepping on the connected plate while holding correct shape."
    - id: plate-runner
      brief: "Encounters 1-3. Bounces charges between plates by stepping on at the right moment."
    - id: add-clear
      brief: "Every encounter. Holds the room while mechanic players work."
    - id: called-guardian
      brief: "Encounter 2 only. Pulled to centre by Called to Reckoning; reads the Herald, gets Stolen Favor."
    - id: inside
      brief: "Encounter 4 only. Trapped in Verity alternate realm. Reads 2D shapes, gives shapes to teammates' statues, escapes with 3D key."
    - id: outside
      brief: "Encounter 4 only. Stays in main realm. Swaps 3D shapes between Inside teammates' statues. Frees Catatonically Decimated allies with Ghosts."
    - id: glyphbreaker
      brief: "Encounter 5 only. Reads Witness hand armband colour. Picks up matching resonance from another hand's attack zone. Returns to the original hand to break it."
    - id: dps
      brief: "Encounter 5 only. Stays mobile on central plate. Damages the Witness during the open window after all 6 glyphs broken."

  sherpa_playbook:
    - "1st-timer? **Add-clear in Substratum**. Learn the resonance shape system without responsibility for plates/conductors."
    - "2nd-timer? **Outside team in Verity** OR plate-runner in Substratum. Outside is harder logic but no time pressure."
    - "3rd+? **Conductor in Repository** (wire-overlap variant), **Glyphbreaker** on Witness."
    - "**Reserve Verity Inside team for run #3+.** That encounter is the wall — 9 hours during world-first race, 1-2 hours for new teams."
    - "Pre-pull rule for EVERY encounter: name shapes-needed, side assignments, callout convention. Salvation's Edge has more callouts than any other raid."

  loadout_general:
    weapons:
      - "**Anti-Barrier + Anti-Overload** mandatory (Overload Minotaurs in Substratum, Devotees of the Witness)."
      - "**Anti-Unstoppable** mandatory (Verity Ogres, Repository Incendior)."
      - "**Burst-DPS heavy** for Witness damage phases — Two-Tailed Fox, Sleeper, Apex Predator, sword swap."
      - "Add-clear primary: Witherhoard, Riskrunner, Outbreak Perfected, wave-frame GLs."
    armor_stats:
      - "Health + Class for everyone — Witness hand attacks kill low-Health builds."
      - "Grenade / Melee for Verity Inside-team grenade/melee Knight kills."
    common_exotics:
      - "Hunter: Star-Eaters / Liar's Handshake / Aeon Swift (Verity)."
      - "Warlock: Phoenix Protocol / Heat Rises / Star-Eaters."
      - "Titan: Cuirass of the Falling Star / Synthoceps / Heart of Inmost Light."

  common_mistakes:
    - "**Holding 4 stacks of resonance** — instant death. Cap at 3."
    - "**Wrong shape in a conductor** (Herald onwards) — instant wipe."
    - "**Standing on the plate too early** — charge passes through, you don't catch it, plate-bounce fails."
    - "**Inside team picking up >2 shapes before escape-ready** — you'll form a 3D key containing your statue's shape, escape impossible, must die and respawn."
    - "**Mixing player identity in Verity** — change colours/loadouts/ghosts to be visually distinct. Same-class same-shader = wipes."
    - "**Glyphbreaker not cleansing resonance** at the central plate before timer runs out → death."

# =========================================================================
encounters:
# =========================================================================

  - order: 1
    slug: substratum
    name: Substratum
    difficulty: medium
    estimated_time: "10-15 min"

    abstract: |
      First encounter. Two teams of three clear side rooms of Sol
      Divisive Vex + Dread. After two waves, find circuit plates +
      conductors and bounce charges between them while picking up
      Pyramidal Resonance. Lock down both conductors → deposit
      resonance in central chest → repeat 2 more times.

    setup: |
      WHAT YOU SEE
      - Large central room with a chest spawn in the middle.
      - Two doors on opposite sides leading to peripheral rooms.
      - Inside peripheral rooms (after they open): glowing floor
        plates and a Resonant Conductor (obelisk with glowing core).
      - Above the central area: a fluxing **WITNESS HAND** (orange-
        triangular). It casts Resonant Outburst — a triangular AoE
        on the floor that will kill low-Health players.
      - Top of screen: **Final Shape Looming** wipe timer.

      PLATFORM MECHANICS
      - Plates: stand on them only when a charge enters (visible
        shrinking circular aura). Step off after the charge bounces.
      - Conductors: stand a few steps AWAY, shoot the centre once
        to ARM. Then the next charge that arrives at YOUR plate while
        you stand on it will lock down the conductor — consumes 1
        resonance stack.
      - Resonance stacks: pick up shapes by walking onto them. Max 3.
        Each has a timer; expiring = death.

      START STATE
      - Encounter starts when one player picks up the central
        Pyramidal Resonance and DUNKS it into the central chest.
        Two side doors open + Final Shape Looming starts.

    callouts:
      - when: "Pre-pull"
        from: lead
        to:   team
        say:  '"3-3 split. Left team = [names], right team = [names]. Conductor player = [name] per side. Plate player = [name] per side. Add-clear = third on each side."'
        why:  "Salvation's Edge has more comms than any other raid; lock roles before pulling."

      - when: "Doors open after dunk"
        from: any
        to:   team
        say:  '"Doors open — go go go."'
        why:  "Supplicants spawn at the rear of each peripheral room when doors open; rushing in dies. Walk forward, take cover."

      - when: "Keeper of the Monolith (Hydra) appears"
        from: any
        to:   team
        say:  '"Keeper [side]!"'
        why:  "Killing each Keeper opens the next sub-room. Top priority."

      - when: "Devotee of the Witness (Overload Minotaur) appears"
        from: any
        to:   team
        say:  '"Overload [side]!"'
        why:  "Overload mod requires Anti-Overload — make sure someone on that side has it."

      - when: "Threshold Sentinel (Tormentor) spawns in centre"
        from: any
        to:   team
        say:  '"Tormentor mid — converge!"'
        why:  "Side doors close while Tormentor is alive — anyone caught inside or in the doorway dies. Move to centre fast."

      - when: "Plates + conductors located"
        from: plate-runner
        to:   conductor
        say:  '"Plate [side] — connecting now."'
        why:  "Confirms which conductor each side is wired to so callouts are unambiguous."

      - when: "Charge bounce missed"
        from: any
        to:   team
        say:  '"Lost charge [side]."'
        why:  "First miss = grace period (no penalty). Second miss → Subjugator spawns and locks plates. Tells team to stay calm or prep for Subjugator."

      - when: "Conductor armed, ready for lockdown"
        from: conductor
        to:   plate-runner
        say:  '"Conductor up — send the next charge."'
        why:  "Next charge into the conductor's connected plate will lock it down. Plate-runner needs to know to step on at the right moment."

      - when: "Conductor locked"
        from: conductor
        to:   team
        say:  '"Conductor [side] LOCKED."'
        why:  "One half done. Other side knows their conductor still needs locking."

      - when: "Both conductors locked, central chest spawning"
        from: any
        to:   team
        say:  '"Both locked. Chest mid — dump resonance!"'
        why:  "Chest is proximity-activated; everyone must converge to deposit. Wipe timer extends after all resonance is dumped."

    wipe_triggers:
      - "Final Shape Looming timer hits 0 → wipe."
      - "Holding 4+ resonance stacks → instant death."
      - "Resonance stack timer expires on you → death."
      - "Standing in Resonant Outburst (triangular floor AoE) at low Health."
      - "Caught in a closing side door when the Threshold Sentinel spawns."

    damage_phase_triggers:
      - "No boss DPS in this encounter — completion = depositing all resonance into the central chest 3 times in a row."

    parallel_timeline:
      - phase: "Pull"
        all:               "Walk into centre. One player picks up the central Pyramidal Resonance + dunks into the chest. Doors open + Final Shape Looming starts."

      - phase: "Side-room clear (rounds 1-2)"
        left_team_3:       "Enter left side. Kill Sol Divisive Vex + Dread. Priority: Hydra (Keeper) → Overload Minotaur (Devotee)."
        right_team_3:      "Mirror on right."
        all_periodically:  "Don't stand under the Witness Hand (triangular AoE on floor). Avoid the swirling indicator."

      - phase: "Threshold Sentinel in centre"
        all:               "Side doors close. Converge to centre fast (caught in doors = death). Burn the Tormentor."

      - phase: "Plates + conductors discovered"
        left_team_3:       "Conductor player arms the conductor. Plate player bounces charges. Third player handles ads + picks up resonance shapes spawning in the side room."
        right_team_3:      "Mirror."

      - phase: "Charges bouncing, resonance collecting"
        all:               "Each plate-runner steps on at the visible aura shrink. Each conductor player picks up max 3 Pyramidal Resonance. Subjugator spawns on 2nd missed bounce — kill it immediately."

      - phase: "Lock both conductors"
        conductor_each_side: "Stand on plate when the charge arrives WHILE conductor is armed → 1 stack consumed, conductor locks."

      - phase: "Deposit at central chest"
        all:               "Converge to chest. Anyone with resonance interacts to dump. Final Shape Looming extends back up. Avoid the Witness's Resonant Gaze attack while dumping."

      - phase: "Repeat 2 more times"
        all:               "Same flow. After 3rd successful round, encounter ends and stairs unfurl into the next area."

    permutations:
      - name: "Standard 3-3 Split, 1 Conductor + 1 Plate + 1 Add-Clear per side"
        learner_friendly: true
        summary: "Default. Two teams of three. Each side: one player owns the conductor, one owns the plate, one handles ads + collects shapes."
        roles:
          - id: conductor
            count: 2
            does: "Arm the conductor. Step on plate when charge arrives WHILE armed. Holds max 3 Pyramidal Resonance stacks. Locks down conductor."
            loadout: ""
          - id: plate-runner
            count: 2
            does: "Step on the connecting plate the moment the charge enters (shrinking aura visible). Step off after bounce."
            loadout: ""
          - id: add-clear
            count: 2
            does: "Hold the side room. Kill Keepers (Hydra), Devotees (Overload Minotaur), Weavers (disrupt plates), Goblins, Subjugator. Pick up resonance shapes in centre when not engaged."
            loadout: ""

      - name: "4-2 with Designated Sentinel Killers"
        summary: "Two players are dedicated Threshold Sentinel killers — they don't do plate/conductor work, only converge mid for Tormentor + run resonance. Other 4 split 2-2 across sides."
        best_for: "Teams that struggle with the Tormentor timing on hard difficulties."
        roles:
          - id: side-pair
            count: 4
            does: "2 per side. Conductor + plate handled between the pair. Light add-clear."
            loadout: ""
          - id: tormentor-killer
            count: 2
            does: "Hover mid. Kill Tormentor instantly when it spawns. Carry resonance to chest."
            loadout: ""

      - name: "Resonance-Heavy (collect overflow for wipe-timer extension)"
        summary: "Instead of dumping 1-2 resonance per round, aggressively collect 3 stacks per player BEFORE locking conductors. Maximum wipe-timer extension."
        best_for: "Master / Contest where Final Shape Looming runs hot."
        roles:
          - id: conductor
            count: 2
            does: "Same, but holds onto 3 stacks until lockdown moment."
            loadout: ""
          - id: plate-runner
            count: 2
            does: "Same."
            loadout: ""
          - id: resonance-collector
            count: 2
            does: "Run between sides + centre, collecting every spawned shape before timers expire."
            loadout: ""

    cheese: []

    common_mistakes:
      - "Plate-runner stepping on the plate too early → charge passes without registering."
      - "Conductor not armed before charge arrives → lockdown fails, must rebound."
      - "Holding 3 stacks and accidentally walking onto a 4th shape → instant death."
      - "Caught in closing side door during Threshold Sentinel — leave the side room IMMEDIATELY when the Tormentor message appears."

    rewards:
      guaranteed:
        - "1× raid armor or weapon."
      hidden_chest:
        location: |
          During the traversal to encounter 1. Detail in overall_notes
          (Secret Deepsight Puzzle).
        rewards:
          - "First of 3 hidden conductors for the Deepsight puzzle."
      potential_drops:
        - "Nullify (pulse rifle, Solar)"
        - "Non-Denouement (combat bow, Arc)"
        - "Imminence (SMG, Strand)"

    master_challenge:
      name: "Scenic Route"
      requirement: |
        Only kill the Overload Minotaur on the LONGER of the two paths
        (the one with the Overload spawn in the 4th room, not the 3rd).
        Read which path is yours by checking the majors in the first
        rooms: Hobgoblins = your path will kill, Attendants = ignore.
        Master adds no Champion spawns beyond the existing path
        Minotaurs.
      enforced_on: "Master only"

    images:
      overview:     ""
      setup:        ""
      callouts:     ""
      damage_phase: ""
      hidden_chest: ""

    learner_path:
      - "1st clear: add-clear. Learn resonance shapes without conductor/plate pressure."
      - "2nd clear: plate-runner."
      - "3rd+: conductor."

# -------------------------------------------------------------------------

  - order: 2
    slug: herald-of-finality
    name: Herald of Finality
    difficulty: hard
    estimated_time: "20-30 min"

    abstract: |
      Boss fight in a triple-circuit arena. 3 teams of 2 across
      left / middle / right sides. Each side has a Trammel
      (Demise / Conflict / Time) — kill yours. Herald summons one
      player from each side to centre via Called to Reckoning;
      they get Stolen Favor from shooting Herald's head spot
      (after blights around the arena are destroyed). Locks
      conductors with a NEW twist: triangle (Pyramidal) OR circle
      (Spherical) — wrong shape = wipe. Deposit resonance → damage
      phase → repeat.

    setup: |
      WHAT YOU SEE
      - Triangular arena split into 3 sides: LEFT, MIDDLE, RIGHT.
      - Each side has its own circuit plate + Resonant Conductor.
      - Central blight in the middle of the arena — destroy to start.
      - Side blights spawn around the arena edges during Called to
        Reckoning — must be destroyed to drop Herald's head shield.
      - **Trammel of Demise** = LEFT side enemy. **Trammel of Conflict**
        = MIDDLE. **Trammel of Time** = RIGHT.
      - Witness Hand: floor-based version this time. Resonant Seekers
        (circular swarm) launch at floor targets.

      PLATFORM MECHANICS
      - Plates and conductors: same as Substratum.
      - NEW — conductor shape requirement: each conductor displays
        EITHER a triangle (needs Pyramidal Resonance) OR a circle
        (needs Spherical Resonance). Check before locking.
      - Resonance OVERRIDE: the LAST shape you picked up is the one
        you'll deposit. Pick up the correct shape last. Earlier
        wrong shapes are overridden.

      START STATE
      - Encounter starts when central blight is destroyed → Herald
        spawns → Final Shape Looming starts.

    callouts:
      - when: "Pre-pull"
        from: lead
        to:   team
        say:  '"Left pair = [names], middle pair = [names], right pair = [names]. Best players to LEFT (harder terrain)."'
        why:  "Left side has the trickiest movement + Trammel of Demise; designate accordingly."

      - when: "Trammel killed on a side"
        from: any
        to:   team
        say:  '"Trammel [side] down."'
        why:  "First Trammel kill triggers Herald to summon players to centre via Called to Reckoning."

      - when: "Player gets Called to Reckoning buff (pulled to centre)"
        from: called-guardian
        to:   team
        say:  '"Called — coming to centre."'
        why:  "Tells the team that the called player is leaving their side; others on that side cover their work."

      - when: "Blights spotted around arena edges"
        from: any
        to:   team
        say:  '"Blight [position] — break it!"'
        why:  "Herald's head spot is shielded until all surrounding blights are destroyed. Calling locations lets the team kill them fast."

      - when: "Called Guardians have Stolen Favor"
        from: called-guardian
        to:   side
        say:  '"Stolen Favor — reading conductor [side]."'
        why:  "Tells the side that the called Guardian will now check the conductor's shape and call out what's needed."

      - when: "Conductor shape requirement read"
        from: called-guardian-with-stolen-favor
        to:   side
        say:  '"Conductor [side] wants TRIANGLE."'  # or CIRCLE
        why:  "Tells the conductor + plate-runner pair which shape resonance to grab. WRONG shape = wipe."

      - when: "Shape mismatch noticed"
        from: any
        to:   team
        say:  "\"WAIT — don't dunk!\""
        why:  "Last-chance call before a wipe. Player can override their last pickup by walking to the correct shape spawn."

      - when: "All conductors locked"
        from: any
        to:   team
        say:  '"All locked — deposit at vista."'
        why:  "Chest spawns at the vista under the Witness's hand. Converge, dump, wipe-timer extends."

      - when: "Damage phase open"
        from: any
        to:   team
        say:  '"Vulnerable — DPS!"'
        why:  "Edges of the arena glow when Herald is damageable. Burst-DPS now."

      - when: "Final Stand"
        from: any
        to:   team
        say:  '"FINAL STAND — 30 SECONDS. Trammels everywhere. Focus Herald."'
        why:  "Herald spawns all Trammels at once. Ignore them. 30s to delete Herald or wipe."

    wipe_triggers:
      - "WRONG shape resonance in a conductor → instant wipe."
      - "Final Shape Looming timer expires."
      - "Called team killed by Herald in centre → 'celebrate your failure' → wipe."
      - "Final Stand timer expires."
      - "Standing in Resonant Seekers (floor swarm) without dodging."

    damage_phase_triggers:
      - "All 3 conductors locked + all resonance deposited at the vista chest → arena edges glow → Herald damageable."

    parallel_timeline:
      - phase: "Pull"
        all:                "Move to assigned side (left / mid / right). Destroy the central blight."
      - phase: "Trammel + add wave"
        left_pair:          "Kill Ravenous Taken Knights, Attendants, Trammel of Demise."
        middle_pair:        "Same with Trammel of Conflict."
        right_pair:         "Same with Trammel of Time."
      - phase: "First Trammel dies → Called to Reckoning"
        called_guardians_3: "One player from each side summoned to centre. Move there."
        side_remaining_3:   "Cover your partner's work back on your side."
      - phase: "Centre — destroy blights, gain Stolen Favor"
        called_guardians_3: "Kill arena-edge blights around Herald. Then shoot Herald's head spot. Get Stolen Favor."
        side_remaining_3:   "Continue add-clear, prep for plate bouncing."
      - phase: "Reading conductors + bouncing charges"
        called_guardians_3: "Return to your side. Read the conductor's shape (triangle or circle). Call out to your partner."
        side_remaining_3:   "Bounce charges between plates. Collect the correct shape last."
      - phase: "Lockdown + deposit"
        all:                "Lock 3 conductors with correct shapes. Converge at vista chest. Dump resonance."
      - phase: "Damage phase"
        all:                "Arena edges glow. Burst-DPS the Herald."
      - phase: "Loop / Final Stand"
        all:                "Repeat until Herald reaches Final Stand. Timer drops to 30s + all Trammels spawn. Ignore Trammels; delete Herald."

    permutations:
      - name: "Standard 3 Sides × 2 Players"
        learner_friendly: true
        summary: "Each side has 1 conductor + 1 plate/add-clear. Called Guardian role rotates per round."
        roles:
          - id: side-pair
            count: 6
            does: "Two per side. One arms + locks the conductor; the other handles plate-runs + adds. Either may be Called to Reckoning."
            loadout: ""

      - name: "Designated Caller (1 fixed Called per side, 3 fixed plate-runners)"
        summary: "Pre-pick the 3 best mechanic players to ALWAYS be Called to Reckoning. The other 3 stay on plates."
        best_for: "Master, or coaching new teams through the Called complexity."
        roles:
          - id: caller
            count: 3
            does: "One per side. Always the one summoned. Reads conductor + handles head-shot in centre."
            loadout: ""
          - id: plate-runner
            count: 3
            does: "One per side. Plate-bouncing + ads. Never called."
            loadout: ""

      - name: "Plate-First Variant"
        summary: "Instead of dealing with Herald first when called, called Guardians IMMEDIATELY return to side and start plate-bouncing. Stolen Favor read happens during the next Called cycle. Trades extra Trammel risk for cleaner plate work."
        best_for: "Teams comfortable with the Trammels."
        roles:
          - id: side-pair
            count: 6

    cheese: []

    common_mistakes:
      - "Calling out the wrong shape needed — verify before dumping into conductor."
      - "Picking up Spherical when Pyramidal needed (or vice versa) and forgetting to override → wipe."
      - "Called Guardians dying in centre = wipe. They MUST survive."
      - "Final Stand: trying to clear Trammels instead of focusing Herald."

    rewards:
      guaranteed:
        - "1× raid armor or weapon."
      hidden_chest:
        location: |
          After completing Substratum (encounter 1). Instead of jumping
          up the GREEN-coloured blocks leading to encounter 2, look for
          a grate on the wall and go past it. Contains the 2nd hidden
          conductor for the Deepsight puzzle.
        rewards:
          - "Second of 3 hidden conductors for the Deepsight puzzle."
      potential_drops:
        - "Summum Bonum (sword, Arc)"
        - "Non-Denouement (combat bow, Arc)"
        - "Forthcoming Deviance (glaive, Void)"
        - "Imminence (SMG, Strand)"

    master_challenge:
      name: "At Capacity"
      requirement: |
        Only deposit Resonance in the conductor chest when holding
        exactly 3 stacks. Forces a 4-person 3-stack rotation per
