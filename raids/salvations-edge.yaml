  - order: 4
    slug: verity
    name: Verity
    difficulty: hard
    estimated_time: "30-60 min (first clears: 1-2 hours)"

    abstract: |
      The infamous shape-puzzle encounter. Team splits into INSIDE (3
      trapped in alternate realm) and OUTSIDE (3 in main realm).
      Inside reads 2D shapes (their statue holds one) and passes
      shapes between Inside teammates to escape with a 3D KEY that
      does NOT contain their own shape. Outside swaps 3D shapes
      between Inside teammates' statues so the final shapes match.
      One full round = both teams done correctly. 3 rounds = win.

    setup: |
      WHAT YOU SEE
      - 6 STATUES of each player at the entrance — exact loadouts and
        Ghosts. **This is why teams must be visually distinct.**
      - 3 GLOWING STATUES deeper in the room (these are the inside
        statues that hold shapes).
      - A PROJECTOR SCREEN behind the glowing statues, fluxing between
        2D shapes: circle, square, triangle.
      - **Imminent End** wipe timer (3:30).

      PLATFORM MECHANICS
      - There is NO platform stepping in Verity. Movement is about
        positioning for the Inside/Outside split.
      - **Selection trick:** standing in the half of the room CLOSER
        to the wall of shattered glass before the encounter starts =
        guaranteed Inside. The other 4 stand near the 6 statues; one
        gets randomly picked Inside.
      - Inside team: trapped in their own bubble realm. Each player
        sees their own statue + 2 teammates' statues from inside.
        They can ONLY interact with their own realm's knights and
        shapes.
      - Shapes you HOLD persist on your character until you deposit
        them on another Guardian's statue (Inside) or swap them
        between statues (Outside).
      - **Catatonic Decimation freeze:** when one Inside team escapes,
        the others are frozen. Outside team must retrieve their
        Ghosts and deposit on the correct frozen statue to revive.

      START STATE
      - Encounter starts when 3 players interact with the glowing
        statues. RNG (or selection-trick) decides Inside/Outside.

    callouts:
      - when: "Pre-pull"
        from: lead
        to:   team
        say:  '"Inside picks: [name1], [name2], [name3]. Outside: [name4], [name5], [name6]. All ensure distinct visual identity — change shaders + ornaments if needed."'
        why:  "Verity REQUIRES visual distinction. Same-class same-shader teams have wiped repeatedly because they can't read each other's statues."

      - when: "Inside team reads their statue shapes"
        from: inside-team
        to:   outside-team
        say:  '"Inside order LEFT to RIGHT facing the projector: [shape], [shape], [shape]."'
        why:  "Outside team needs the Inside statues' held shapes to compute the swaps."

      - when: "Inside player ready to pass a shape"
        from: inside-player
        to:   target inside teammate
        say:  '"[Name] — passing you a [shape]."'
        why:  "Inside players can only give shapes to OTHER Inside players' statues (never their own). Clear targeting prevents duplicate or missed handoffs."

      - when: "Inside player ready to escape (holds 2 shapes ≠ their statue's shape)"
        from: inside-player
        to:   team
        say:  '"[Name] escaping — got [shape1] + [shape2]."'
        why:  "When all 3 Inside escape, the Catatonic Decimation freeze hits everyone but one. Team needs to be ready to revive."

      - when: "Outside dissection plan"
        from: outside-lead
        to:   outside-team
        say:  '"Swap plan: take a [shape] from statue [X] to statue [Y]; take a [shape] from statue [Z] to statue [W]."'
        why:  "Outside team operates by SWAPPING shapes between statues — every move affects two. Plan before acting."

      - when: "Catatonic Decimation freeze"
        from: outside-lead
        to:   outside-team
        say:  '"Ghosts up — [name1] needs ghost back to [position1], [name2] to [position2]..."'
        why:  "Frozen players spectate. Outside collects 3 Ghosts and deposits each to the correct statue. WRONG statue = instant death for the depositor."

      - when: "All 3 inside teams escaped + frozen players revived"
        from: any
        to:   team
        say:  '"Round [N] done. Reset, fight ads, prep for round [N+1]."'
        why:  "Imminent End pauses. Wave of Grim/Thrall/Unstoppable Ogres incoming."

      - when: "Final round wave of Ogres"
        from: any
        to:   team
        say:  '"Unstop Ogres — Anti-Stun!"'
        why:  "Two Unstoppable Ogres per round. Anti-Unstoppable required."

      - when: "Final ascension"
        from: any
        to:   team
        say:  '"Lift up — heading to Witness."'
        why:  "After 3 successful rounds, the lift to the next encounter activates."

    wipe_triggers:
      - "Imminent End timer expires."
      - "Inside player forms a 3D key containing their statue's shape → escape impossible → must die + respawn."
      - "Outside player deposits a Ghost onto the WRONG Guardian's statue → instant death + cascading failure."
      - "All Inside players Catatonically Decimated + no Outside survivor → wipe."

    damage_phase_triggers:
      - "No boss DPS. Completion = 3 rounds of correct shape dissection + Catatonic revival."

    parallel_timeline:
      - phase: "Pull"
        all:                  "Activate the 3 glowing statues. RNG (or selection-trick) splits Inside (3) and Outside (3)."
      - phase: "Inside team reads"
        inside_team:          "Read your own statue + 2 teammate statues. Call out the order left-to-right."
        outside_team:         "Listen. Note the Inside shapes."
      - phase: "Inside shape collection (round 1)"
        inside_team:          "Kill Splintered Curator Knights to drop the projector-screen shape. Pick up shape. Deposit on an Inside teammate's statue (NEVER your own, NEVER already-served)."
        outside_team:         "Kill 3 Knights on your side to access all 3 shapes. Begin dissection — swap shapes between Inside statues. Plan ahead."
      - phase: "Inside escape with 3D key"
        inside_team:          "Once you hold 2 shapes that are NOT your statue's shape, form a 3D key. Walk through the glass wall."
        outside_team:         "Continue dissection until Inside statues reflect the correct outside shape compositions."
      - phase: "Catatonic Decimation freeze"
        all:                  "When Inside escapes, all but one player freezes. Three Ghosts appear on the Outside. Survivor + frozen-spectators coordinate Ghost-to-statue."
      - phase: "Revival"
        frozen_players:       "Spectate, guide survivor to correct statues."
        survivor:             "Pick up each Ghost, deposit on the correct statue. WRONG statue = death."
      - phase: "Add wave between rounds"
        all:                  "Grim, Thrall, 2× Unstoppable Ogres. Anti-Unstoppable mandatory."
      - phase: "Repeat rounds 2 + 3"
        all:                  "Same flow. After round 3 — lift to Witness encounter activates."

    permutations:
      - name: "Standard Inside/Outside 3-3"
        learner_friendly: false
        summary: "Default. RNG splits the team. Pre-coordinated callouts handle dissection."
        roles:
          - id: inside
            count: 3
            does: "Trapped in alt realm. Read statues. Collect shapes from Splintered Curator knights. Pass shapes to teammates' statues (NEVER own). Form 3D key ≠ your own shape. Escape."
            loadout: ""
          - id: outside
            count: 3
            does: "Stay in main realm. Kill outside Splintered Curators. Swap 3D shapes between Inside statues. Free Catatonically Decimated allies with Ghosts."
            loadout: ""

      - name: "Selection Trick (guarantee specific Inside/Outside)"
        summary: "Position 2 players against the shattered-glass wall before pulling — they are GUARANTEED Inside. The 4 statue-side players have 1 chosen at random for Inside. Lets you pre-assign mechanic-heavy players to roles."
        best_for: "Teams who have a clear weak link on Verity — pin them to Outside (or Inside, whichever they're better at)."
        roles:
          - id: pinned-inside
            count: 2
            does: "Stand against shattered-glass wall before pull. Guaranteed Inside."
            loadout: ""
          - id: pinned-outside
            count: 3
            does: "Stand near 6 statues. One of you will be Inside randomly; rest are Outside."
            loadout: ""
          - id: floater
            count: 1
            does: "Stand near 6 statues OR shattered glass per team plan."
            loadout: ""

      - name: "Single-Dissection Speedrun"
        summary: "Outside team aims to finish dissection in ONE pass — only possible if Inside statues' starting 3D shapes contain all 3 shapes once each (cone + cylinder + prism, e.g.). Saves a full round."
        best_for: "Experienced Verity teams."
        roles:
          - id: inside
            count: 3
          - id: outside
            count: 3
            does: "Compute the single-pass dissection at start. Move only the necessary 2 swaps. Verify before completion."
            loadout: ""

    cheese:
      - title: "Visual distinction = encounter clarity"
        detail: |
          Force all 6 to wear different shaders. Change Ghost shells.
          Same-class fireteams are the #1 cause of Verity wipes — you
          literally can't tell which statue is which. Spend 60 seconds
          on this before pulling, not 60 minutes wiping.

    common_mistakes:
      - "Inside player picks up >2 shapes WITHOUT being ready to escape → forms a 3D key containing their own statue's shape → escape impossible."
      - "Inside player deposits a shape on their OWN statue → can't progress."
      - "Outside player deposits a Ghost on the wrong frozen statue → instant death + must restart Ghost collection."
      - "Outside team operating without a plan — every swap affects 2 statues. Plan before acting."
      - "Same-class same-shader fireteam — visually indistinguishable statues = chaos."

    rewards:
      guaranteed:
        - "1× raid armor or weapon."
      hidden_chest:
        location: |
          After completing Repository (encounter 3). Trigger the dialogue
          where the Witness reveals itself to be the Winnower's first
          knife, then jump up the RED-coloured blocks. Contains the 3rd
          and final hidden conductor for the Deepsight puzzle.
        rewards:
          - "Third of 3 hidden conductors for the Deepsight puzzle."
      potential_drops:
        - "Summum Bonum (sword, Arc)"
        - "Non-Denouement (combat bow, Arc)"
        - "Imminence (SMG, Strand)"

    master_challenge:
      name: "Varied Geometry"
      requirement: |
        Cannot use the same 3D shape to escape the solo realm until
        all six 3D shapes (sphere, cube, pyramid + prism, cone,
        cylinder) have been used across phases. Phase 1: dissect
        composite shapes (prism/cone/cylinder). Phase 2: dissect
        pure shapes (sphere/cube/pyramid) — coordinate with solo
        players since the lock-and-key rule still applies. Phase 3:
        revert to composites. Master adds Unstoppable Ogres in solo
        rooms.
      enforced_on: "Master only"

