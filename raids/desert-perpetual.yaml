  # ====================================================================

  - order: 1
    slug: epoptes
    name: "Epoptes, Lord of Quanta"
    difficulty: hard
    estimated_time: "20-30 min"

    abstract: |
      Vex Hydra trio: Epoptes + Particle Lens + Wave Lens. Lenses
      protected by 6-eye shields (visible via shield-of-light cones).
      Constant + Cyclical Temporality players see eye positions on
      pillars → call out cross-team → destroy 3 eyes per side → break
      shields → kill Lenses → Epoptes DPS phase with sub-phase eye
      mechanic.

    setup: |
      WHAT YOU SEE:
      - Central arena pit.
      - Epoptes (large Hydra) hovers above pit, supported by Particle Lens (L) + Wave Lens (R).
      - Plates L+R for Temporality debuffs.
      - Pillars in each side room with 6 eye positions visible only via shield-of-light cone.
      - Time's Magistrates (Major Cyclopses) on each side.

      PLATFORM MECHANICS:
      - Approach Epoptes → Lenses vanish briefly; Epoptes attacks.
      - Kill Time's Magistrates (L + R) → plates unlock.
      - Two players step plates simultaneously: L = Constant Temporality, R = Cyclical Temporality (30s death timer).
      - Constant + Cyclical players enter side rooms (their respective Lens).
      - Inside cone of light from Lens shield: timer freezes + see 1 of 6 lit eye on pillar.
      - Call eye position cross-team. Constant destroys the eye Cyclical called; Cyclical destroys the eye Constant called. (Cross-talk.)
      - Wrong eye = regen + stalls time + Epoptes accelerates wipe meter.
      - Destroy 3 eyes max per Lens (more triggers wipe phase).
      - Wipe phase ("Broken by Quanta"): inside players (NOT Hydra-eyes shooters) deal with Epoptes' own 2 shields.
        Same 2-shield, 3-eyes-each system. Cross-call again.
      - Cleanse all 6 Epoptes eyes → wipe averted, eyes refresh.
      - Refresh Temporality at plates. Continue eye-burst.
      - Once all 6 Lens eyes done → shoot central Lens eye = Lens dies.
      - On first Lens death → Epoptes wipe sub-phase → 6-eye dance.
      - Repeat for second Lens. Lens shield breaks on central eye → Epoptes vulnerable → DPS phase.
      - During DPS: Epoptes regenerates 2 shields. Random 2 players get Constant/Cyclical. They see 6 orbiting eyes around central eye → shoot all → break shield → continue DPS.
      - 3 sub-phases → Epoptes immunity → restart mechanics.

      START STATE: rally banner. Approach to engage.

    callouts:
      - when: "Magistrates down"
        from: "killer"
        to:   "team"
        say:  '"MAGISTRATES — plates open."'
        why:  "Step plates for debuffs."
      - when: "Plate stepped"
        from: "self"
        to:   "team"
        say:  '"CONSTANT/CYCLICAL — going [L/R] room."'
        why:  "Designate Lens hunter."
      - when: "Eye position seen (in cone)"
        from: "Constant"
        to:   "team"
        say:  '"Constant sees: [position]"'
        why:  "Cyclical player destroys this on their Lens."
      - when: "Cyclical sees"
        from: "Cyclical"
        to:   "team"
        say:  '"Cyclical sees: [position]"'
        why:  "Constant destroys."
      - when: "3 eyes done"
        from: "self"
        to:   "team"
        say:  '"3 EYES — wipe phase incoming."'
        why:  "Switch to inside-Epoptes 6-eye dance."
      - when: "DPS phase"
        from: "any"
        to:   "team"
        say:  '"DPS — orbiting eyes for shield cycle!"'
        why:  "2 selected players go to shields."

    wipe_triggers:
      - "Wrong Lens eye destroyed = wipe mechanic."
      - "Wrong Epoptes eye in 6-eye dance = wipe."
      - "Temporality 0s = death."
      - "Failure to refresh shield cycle during DPS = forced reset."

    damage_phase_triggers:
      - "Both Lenses' central eyes shot → shields drop → Epoptes vulnerable → ~30s DPS window."

    parallel_timeline:
      - phase: "Pull"
        all: "Engage. Burst Magistrates."
      - phase: "Lens kill cycle"
        L_team_3: "Constant + Hydra eyes + add-clear."
        R_team_3: "Cyclical + Hydra eyes + add-clear."
      - phase: "Epoptes wipe sub-phase"
        inside_team: "Burst 6 orbiting eyes per shield. Cleanse."
      - phase: "DPS"
        all: "Burst Epoptes after shields drop."
      - phase: "Reset"
        all: "Cycle."

    permutations:
      - name: "Standard 3L / 3R split"
        learner_friendly: true
        summary: "Each side has Constant/Cyclical player + Hydra eye shooter + add-clear."
        roles:
          - id: temporality_holder
            count: 2
            does: "Constant (L) + Cyclical (R). Lens eyes."
          - id: hydra_eye_shooter
            count: 2
            does: "Shoot called eyes on Lens shields."
          - id: add_clear
            count: 2
            does: "Suppress Harpies + Goblins."

      - name: "Challenge: No sequential eye"
        learner_friendly: false
        summary: "Cannot destroy same Lens' eye twice in a row. 2 players per side swap eye-destruction roles."

    cheese: []

    common_mistakes:
      - "Misreading 6-eye position (top/middle/bottom × L/R/center)."
      - "Forgetting cross-talk (Constant shoots what Cyclical sees)."
      - "Stalling time = wipe meter fills."

    rewards:
