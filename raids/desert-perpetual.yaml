      - "2nd: temporality_holder."

  # ====================================================================

  - order: 3
    slug: iatros
    name: "Iatros, Inward-Turned"
    difficulty: hard
    estimated_time: "25-35 min"

    abstract: |
      Vex Hobgoblin. Climber ascends 3 levels via Diastole-timed cube
      breaks (Builders shoot cubes on Diastole pulse). Hourglass filled
      with Cinnabar/Antimony Chronons from 6 Time's Burdens — diamond
      Oracle shot to start. Add-clear team kills extra Time's Burdens to
      refill Hourglass.

    setup: |
      WHAT YOU SEE:
      - Iatros in central area.
      - Hoop with hourglass + spherical receptacle in front of Iatros.
      - 3 pillars (one per area: spawn, middle, boss spawn) with 3 cubes each.
      - 6 Time's Burden Minotaurs at start; more spawn periodically.

      PLATFORM MECHANICS:
      - Engage Iatros + 6 Time's Burdens.
      - Each player kills 1 Minotaur, picks Chronon (Cinnabar = Red, Antimony = White), jumps through hoop, deposits.
      - 6 Chronons in hoop → Diamond Oracle visible → shoot to start prep phase.
      - All players get Diastole buff (pulse counter, fires on 4th cube break).
      - Climber: needs Absolute Temporality from a plate. Builders mark 3 areas (spawn / middle / boss-spawn).
      - 3 cubes per pillar. Builders shoot BOTTOM cube exactly when Diastole pulse hits the 4th sequence pip.
      - Climber jumps onto freshly-created platforms, ascending.
      - Climber interacts with first cube → MIDDLE cube unlocks. Builders shoot MIDDLE cube on Diastole.
      - Bottom platforms VANISH when middle ones spawn → time jumps.
      - Climber interacts with second cube → TOP cube unlocks. Same Diastole timing.
      - Climber interacts with THIRD cube → DPS phase.
      - During this, 2 floaters hunt randomly-spawning Time's Burdens + dunk Chronons into Hourglass to prevent Neomutation wipe (12s timer when Hourglass empties).
      - DPS phase: Iatros vulnerable. Warp Lance + Ground Slam are dangerous.
      - Repeat 3 phases.

      START STATE: rally banner. Engage.

    callouts:
      - when: "Chronon collected"
        from: "self"
        to:   "team"
        say:  '"Chronon — dunking."'
        why:  "Hoop refill."
      - when: "Diamond Oracle shot"
        from: "shooter"
        to:   "team"
        say:  '"ORACLE — Diastole active."'
        why:  "Cue Climber + Builders to position."
      - when: "Climber position"
        from: "climber"
        to:   "team"
        say:  '"Bottom cube — shoot on 4th!"'
        why:  "Builder coordination."
      - when: "Builder shoots"
        from: "builder"
        to:   "team"
        say:  '"Cube DOWN — platforms!"'
        why:  "Climber jumps."
      - when: "Hourglass low"
        from: "watcher"
        to:   "team"
        say:  '"HOURGLASS 3s — Chronon!"'
        why:  "Refill priority."
      - when: "DPS open"
        from: "any"
        to:   "team"
        say:  '"DPS — to Climber!"'
        why:  "Converge top."

    wipe_triggers:
      - "Diastole mistimed = platforms collapse + Climber falls."
      - "Hourglass empties + 12s Neomutation = wipe."
      - "Warp Lance one-shot at exposed sightline."

    damage_phase_triggers:
      - "Climber interacts third cube → Iatros vulnerable → DPS until Iatros teleports or Hourglass empties."

    parallel_timeline:
      - phase: "Pull"
        all: "Engage. 6 Minotaurs → Chronons → Hoop."
      - phase: "Prep phase"
        builders_3: "Position at each pillar."
        climber: "Get Absolute, find first platform."
        floaters_2: "Watch + Time's Burden hunt."
      - phase: "Cube cycle (×3 levels)"
        all: "Diastole-time cube breaks. Climber ascends."
      - phase: "DPS"
        all: "Burst Iatros at top."

    permutations:
      - name: "Standard 1-Climber / 3-Builders / 2-Floaters"
        learner_friendly: true
        summary: "1 Climber, 3 Builders (one per pillar), 2 Hourglass-refillers."
        roles:
          - id: climber
            count: 1
            does: "Solo ascent + cube interactions."
          - id: builder
            count: 3
            does: "Diastole-time cube destruction."
          - id: floater
            count: 2
            does: "Add-clear + Hourglass refill."

      - name: "Challenge: 3 Climbers"
        learner_friendly: false
        summary: "Each pillar gets a Climber instead of 1."

    cheese: []

    common_mistakes:
      - "Diastole mistiming — Climber falls."
      - "Forgetting to refill Hourglass during DPS = Neomutation mid-burst."
      - "Climber damaged during cube interaction = progress reset."

    rewards:
      guaranteed:
        - "1× raid weapon or armor"
      hidden_chest: null
      potential_drops:
        - "The When and Where (rocket)"
        - "Opaque Hourglass (bow)"
        - "Antedate (SMG)"
        - "Collective Psyche armor"

    images:
      overview: ""
      setup: ""
      callouts: ""
      damage_phase: ""

    learner_path:
      - "1st: floater."
      - "2nd: builder."
      - "3rd: climber."

  # ====================================================================

  - order: 4
    slug: koregos
    name: "Koregos, the Worldline (final boss)"
    difficulty: hard
    estimated_time: "30-50 min"

    abstract: |
      Final boss. Mega Hydra. 6-min Digitization wipe timer. Constant
      stunners take down Koregos's 4 arms (Arc beam interrupt). 3-team
      Temporality cycle: Absolute sees Chronon color in Hoop, Constant
      sees Mine colors, Cyclical sees TRUE mines (3 of 6 are real). Dunk
      6 Chronons in Hoop → diamond → Koregos exposes head. 4-arm cube
      puzzle (Constant+Cyclical see, Absolute interacts). Head DPS with
      Arc beams + final stand with shrinking time + Decoherence wipe at
      death.

    setup: |
      WHAT YOU SEE:
      - Wide circular arena with central pit.
      - Koregos hovers center, then teleports to corners.
      - 3 plates: Constant (L), Absolute (M), Cyclical (R) from spawn perspective.
      - 6 "sea-mine" devices around arena.
      - Hoop-mounted Hourglass over central pit.
      - 4 Tetrad pillar pools (Temporal Oculus refresh).

      PLATFORM MECHANICS:
      - Approach to engage. 6-min Digitization timer starts.
      - Split: STUNNER team (Constant + add-clear) + MECHANIC team (1 Constant + 1 Absolute + 1 or 2 Cyclical).
      - Mechanic loop:
        • Kill ambient + Coryphaeus Hydras → 3 plates active.
        • Pick Temporalities.
        • Stand in Temporal Oculus pool → get Oculus buff.
        • Absolute: sees Chronon color needed in Hoop (Cinnabar/Antimony/Cobalt).
        • Constant: sees which mines hold that color (dust aura).
        • Cyclical: sees TRUE mines (digital aura). 3 of 6 are real.
        • Cross-talk: Absolute calls color → Constant marks colored mines (e.g., Trace Rifle ping) → Cyclical confirms TRUE.
        • Absolute destroys TRUE mines = Chronons drop.
        • Cyclical picks Chronon, dunks in Hoop. DOUBLE-DUNK strategy = 2 Cyclicals dunk near-simultaneously.
      - Wrong dunk = instant death.
      - 6 Chronons in Hoop → diamond Oracle visible → shoot to advance.
      - Koregos teleports up. 4-arm cube puzzle phase:
        • 2 cubes for Constant + Cyclical (each sees 2 of 3) per arm.
        • Absolute interacts with the cube BOTH see common.
        • Constant: from Koregos perspective, calls cube positions (e.g., "middle + left").
        • Cyclical: from Koregos perspective, calls cube positions.
        • Absolute interacts with the common position.
        • Optional: Constant/Cyclical STAND on the absent-cube position (the one only they see). Shows Absolute the common.
      - All 4 arms = head exposed.
      - DPS phase: shoot head (3-eye sets). Arc beam diamond fires 2 beams in changing paths — dodge.
      - 1 player can extend phase: matches dusty aura around local Hoop with Chronon around Koregos. Dunk = extension.
      - 3 damage extension checks per phase.
      - Final stand: spinning head, beams more erratic. Decoherence Imminent debuff at boss death — get FAR from Koregos or wipe.

      START STATE: rally banner. Interact cube in middle to start.

