# raids/desert-perpetual.yaml — Pass 1 (destinypedia baseline + Epic variant)

slug: desert-perpetual
name: The Desert Perpetual
activity_type: raid
released:
  expansion: The Edge of Fate (Epic variant in Ash & Iron)
  year: 2025  # July 19, 2025
roster_status: current
fireteam_size: 6
power_floor:
  normal: 100   # new normalized scaling (Renegades-era)
  master: ""    # TBD; Epic Raid is the harder variant
location: "Unknown Space (IX Realms) → Kepler's singularity"
tags: [vex, nessian-schism, conductor, non-linear, three-temporalities, epic-raid, exotic-rocket, whirling-ovation]

average_clear_time:
  normal_experienced: "60-90 min"
  normal_learning:    "3-5 hr"

# ========================================================================
overview:
  abstract: |
    Edge of Fate raid. Second NON-LINEAR D2 raid (after Leviathan).
    Pick any 3 of 4 bosses (Epoptes/Agraios/Iatros) in any order, then
    Koregos. All encounters key off the 3 Temporality debuffs
    (Constant/Cyclical/Absolute). Source of Whirling Ovation (exotic
    rocket launcher).

  bosses:
    - name: "Epoptes, Lord of Quanta"
      encounter: "non-linear (any of 1-3)"
      role: "Vex Hydra trio (Particle/Wave Lens + Epoptes); 6-eye Lens kill via shield-of-light"
    - name: "Agraios, Inherent"
      encounter: "non-linear (any of 1-3)"
      role: "Vex Hobgoblin + 3 proxies (Made Constant/Absolute/Cyclical); ring charge + Alignment Charge detainment"
    - name: "Iatros, Inward-Turned"
      encounter: "non-linear (any of 1-3)"
      role: "Vex Hobgoblin (sniping); 3-floor Climber + Builder + Hourglass mechanic"
    - name: "Koregos, the Worldline / Fractured in Time"
      encounter: 4
      role: "Final boss — Mega Hydra; mines + Hourglass + 4-arm cube puzzle + head DPS"

  recurring_mechanics:
    - name: "3 Temporality debuffs"
      brief: |
        Three colored debuffs from specific plates:
          • CONSTANT TEMPORALITY (left plate)
          • CYCLICAL TEMPORALITY (right plate)
          • ABSOLUTE TEMPORALITY (middle plate — added in Agraios/Koregos)
        Each gives access to specific shield-of-light cones, ring colors,
        or cube views. Wrong debuff at mechanic = wipe.

    - name: "Time's Magistrates (Major Cyclopses)"
      brief: |
        Kill to unlock plates that grant Temporality debuffs. Encounter 1 +
        4. Respawn periodically.

    - name: "Cobalt / Cinnabar / Antimony Chronons"
      brief: |
        3 Chronon colors (Blue/Red/White) dropped by Time's Burden
        Minotaurs. Used differently per encounter:
          • Agraios: charge rings.
          • Iatros: fill Hourglass (color irrelevant at first; later matters).
          • Koregos: fill Hourglass (color critical, Absolute player calls).

    - name: "Lens-of-light cones"
      brief: |
        Shielded enemies project cones of light visible only to debuffed
        players. Standing in cone = freezes debuff timer + reveals eye/
        symbol/cube targets.

    - name: "Hoop-mounted Hourglass"
      brief: |
        Iatros + Koregos. Diamond Oracle beneath. Slowly drains; refill
        with Chronons or Neomutation wipe begins.

  role_archetypes:
    - id: temporality_carrier
      brief: "Holds a Constant/Cyclical/Absolute debuff. Mechanic-specific routes."
    - id: chronon_runner
      brief: "Kills Time's Burdens, gathers + runs Chronons."
    - id: stunner
      brief: "Constant-buffed; stuns Koregos arms (final boss specific)."
    - id: cube_solver
      brief: "Iatros climber + Koregos cube-trio puzzle."

  sherpa_playbook:
    - "Pre-pull: review symbols + Temporality color assignments."
    - "Whirling Ovation exotic: ~5% chance from Koregos, re-rollable."
    - "EPIC RAID (Ash & Iron variant): harder + better loot tier (Wayward Psyche armor, Epic-only weapons)."
    - "Atemporal title: requires completing all FEATS (Phase Race / Token Limit / Cutthroat / Encounter Challenges / Battalions)."

  loadout_general:
    weapons:
      - "Burst DPS: Whisper, Sleeper, Linear Fusion, Whirling Ovation itself."
      - "Trace Rifles for Mine identification (Koregos)."
      - "Anti-Champion mods for Epic / Master rotators."
    armor_stats:
      - "Mobility for Iatros vertical Climber."
      - "Resilience for Koregos Arc beam."
    common_exotics:
      - "Hunter: Star-Eater Scales, Gyrfalcon's Hauberk."
      - "Titan: Cuirass of the Falling Star, Heart of Inmost Light."
      - "Warlock: Well of Radiance (multi-Well recommended), Speaker's Sight, Phoenix Protocol."

  common_mistakes:
    - "Wrong Lens eye destroyed (Epoptes) = wipe."
    - "Wrong ring charge for wrong Alignment player (Agraios) = stalled."
    - "Climber not timing Diastole cube destruction (Iatros) = platforms collapse."
    - "Koregos: wrong Chronon dunked = instant death."
    - "Final stand (Koregos): standing too close to dying body = Decoherence Imminent wipe."

