  # ====================================================================

  - order: 2
    slug: agraios
    name: "Agraios, Inherent"
    difficulty: hard
    estimated_time: "25-35 min"

    abstract: |
      Vex Hobgoblin boss with 3 proxies (Made Constant/Cyclical/Absolute).
      5 rings to charge with Cobalt Chronons (from Time's Burden Minotaurs).
      3 plates grant Temporality. Sniping proxy: matching-Temporality
      player runs to proxy platform, interacts with Vex device → builds
      Alignment Charge → ricochet detainment bubble to kill proxy →
      Agraios exposed → DPS.

    setup: |
      WHAT YOU SEE:
      - Central arena with 5 rings (number 1-5 clockwise from spawn).
      - 3 plates inside the ring circle (Constant L, Absolute M, Cyclical R).
      - Agraios + 3 proxies (Made Constant, Made Absolute, Made Cyclical) on 4 Vex platforms.
      - Time's Burden Minotaurs spawn in corners.
      - Ultra Hydra spawns mid-encounter.
      - Coryphaeus Wyverns spawn around arena after Ultra Hydra dies.

      PLATFORM MECHANICS:
      - Approach to engage.
      - Agraios teleports to 1 of 4 platforms; 3 proxies (Made X) occupy the others.
      - Kill ambient + Ultra Hydra → 5 Time's Burden Minotaurs spawn in corners → Cobalt Chronons drop.
      - 5 Guardians take 1 Chronon each, run through ring 1-5 to charge. Each charges only 1 ring.
      - 3 Coryphaeus Wyverns spawn → 3 plates activate.
      - 3 plate players step → take Constant/Absolute/Cyclical Temporality (longer-lasting than encounter 1).
      - One proxy starts SNIPING (Variable Elimination debuff: 10s, instant kill at 0 even if hidden afterwards).
        Cover breaks LoS + resets timer to 10s.
      - Plate players ID the SNIPING proxy's title (Made Constant/Cyclical/Absolute) and call it.
      - Player with matching Temporality runs to proxy platform → interacts with Vex receptacle.
      - That player now has ALIGNMENT CHARGE buff + 5 small boxes beneath.
      - Other 2 plate players see 2 RINGS glowing BLUE (out of 5; others flash red).
      - Call blue rings to non-plate players → they Chronon-charge those blue rings.
      - Alignment player runs through CHARGED rings to fill the 5 boxes.
      - Max Alignment Charge → grenade ability replaces with Vex-gate icon.
      - One player draws proxy aggro, counts down. At ~4s: Alignment player detonates Detainment Bubble = ricochet = proxy dies.
      - Agraios exposed → DPS phase.
      - During DPS, Alignment buff returns → re-do ring run + detain ricochet for second/third proxy kill = extended DPS.
      - 3 ricochet detains per damage phase.

      START STATE: rally banner. Approach to engage.

    callouts:
      - when: "Time's Burden Minotaur"
        from: "spotter"
        to:   "team"
        say:  '"MINOTAUR [corner] — Chronons."'
        why:  "Pickup target."
      - when: "Ring charged"
        from: "self"
        to:   "team"
        say:  '"Ring [N] CHARGED."'
        why:  "Track 5 rings."
      - when: "Sniping proxy"
        from: "tracker"
        to:   "team"
        say:  '"SNIPING: Made [Constant/Cyclical/Absolute]."'
        why:  "Designate Alignment player."
      - when: "Blue rings"
        from: "plate player"
        to:   "team"
        say:  '"Blue rings: [N1] + [N2]."'
        why:  "Charge order."
      - when: "Alignment buff full"
        from: "self"
        to:   "team"
        say:  '"ALIGNMENT FULL — countdown!"'
        why:  "Goader steps out."
      - when: "Goader counting"
        from: "goader"
        to:   "team"
        say:  '"5, 4, 3, 2, 1 — DETONATE."'
        why:  "Sync ricochet."

    wipe_triggers:
      - "Variable Elimination 0s = instant death."
      - "Wrong ring charged for Alignment player = stalled."
      - "Alignment Charge wasted on premature detonation = no DPS trigger."
      - "Agraios wipe meter fills (slow but ongoing)."

    damage_phase_triggers:
      - "Ricochet kills proxy → Agraios teleports center + vulnerable → ~25-30s DPS."

    parallel_timeline:
      - phase: "Pull"
        all: "Engage. Ultra Hydra first."
      - phase: "Chronon + ring charge"
        chronon_runners: "5 players charge 5 rings."
      - phase: "Plate + proxy ID"
        plate_holders_3: "Step Temporality plates."
      - phase: "Alignment phase"
        alignment_player: "Sniper-matching Temp. Run rings, fill Charge."
        ring_chargers: "Charge blue rings on call."
      - phase: "Ricochet + DPS"
        goader: "Steps out, counts down."
        alignment_player: "Detonates at ~4s."
        team: "Burst Agraios."
      - phase: "Re-ricochet during DPS"
        alignment_player: "Re-fill Charge mid-DPS."

    permutations:
      - name: "Standard 3-plate / 3-charge"
        learner_friendly: true
        summary: "3 Temporality holders, 3 ring chargers + add-clear."
        roles:
          - id: temporality_holder
            count: 3
            does: "Constant/Cyclical/Absolute. Alignment when proxy matches."
          - id: ring_charger
            count: 3
            does: "Cobalt Chronons → ring charges."

      - name: "Challenge: All-Chronons collected"
        learner_friendly: false
        summary: "No player picks Chronon until ALL have. Slow + coordinated."

    cheese: []

    common_mistakes:
      - "Charging the wrong-color ring."
      - "Premature Detainment Bubble = wasted DPS prep."
      - "Goader survives the Variable Elimination if not ricochet'd."

