  # ====================================================================

  - order: 7
    slug: daughters-of-oryx
    name: "Daughters of Oryx (Ir Anûk + Ir Halak)"
    difficulty: hard
    estimated_time: "20-30 min"

    abstract: |
      Two Wizard sisters. One sings deathsong (wipe in ~2 min), other
      actively shoots. Plate sequence + Torn Between Dimensions player
      collects Blightguard pieces via jumping platforms only they see.
      3 cycles → Brand Claimer steals the active daughter's Brand → DPS
      that daughter. Once one daughter dies, MUST kill the other in next
      phase or wipe.

    setup: |
      WHAT YOU SEE:
      - 4 corner plates in the Threshold arena.
      - 2 Wizard bosses (Ir Anûk + Ir Halak) — one sleeping, one active.
      - Knights on plates initially.
      - Sleeping daughter sings deathsong (2-min timer).

      PLATFORM MECHANICS:
      - Kill Knights on plates → step on dimly-glowing plate.
      - 1 random player becomes Torn Between Dimensions (can't shoot, sees special platforms).
      - Torn player must walk path of invisible-to-others platforms, made physical by 2 other players on separate plates.
      - At end of path: orb pickup ("a piece of the Blightguard has been found").
      - Repeat 3 times. On 3rd run, the Torn player picks up Brand Claimer.
      - Brand Claimer: STEAL the ACTIVE daughter's Brand (the one shooting, NOT the singing one). After steal → DPS the daughter you stole from.
      - Kill one daughter = must kill the other next phase or WIPE.
      - 2-min deathsong timer — if not stolen by ~1:30, wipe at 2:00.

      START STATE: rally banner. Walk in to start. Deathsong begins.

    callouts:
      - when: "Torn Between Dimensions"
        from: "torn player"
        to:   "team"
        say:  '"TORN — going [direction] path."'
        why:  "Plate-holders sync to enable path."
      - when: "Plate stepped"
        from: "stepper"
        to:   "team"
        say:  '"Plate [N] up — second plate now."'
        why:  "Coordinated activation."
      - when: "Blightguard piece found"
        from: "any"
        to:   "team"
        say:  '"PIECE [N/3] — back to plates."'
        why:  "Cycle restart."
      - when: "Brand Claimer ready (3rd cycle)"
        from: "torn"
        to:   "team"
        say:  '"CLAIMER — stealing [active daughter]."'
        why:  "DPS target."
      - when: "Brand stolen, DPS"
        from: "claimer"
        to:   "team"
        say:  '"STOLEN — burn [Ir Anûk/Ir Halak]!"'
        why:  "All burst target daughter."

    wipe_triggers:
      - "Deathsong completes without Brand steal = wipe."
      - "Killing one daughter without killing the other in next phase = wipe."
      - "Torn player fails to claim Blightguard pieces in time."

    damage_phase_triggers:
      - "Brand stolen via Claimer → DPS window on that daughter."

    parallel_timeline:
      - phase: "Pull"
        all: "Engage Knights on plates."
      - phase: "Plate cycle (3 times)"
