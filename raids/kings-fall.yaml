# raids/kings-fall.yaml — Pass 1 (destinypedia baseline)

slug: kings-fall
name: King's Fall
activity_type: raid
released:
  expansion: "(Original D1 The Taken King, 2015) — reprised D2 2022"
  year: 2022  # D2 reprise during Season of Plunder
roster_status: current
fireteam_size: 6
power_floor:
  normal: 1560
  master: 1590
location: "Dreadnaught (Oryx's flagship)"
tags: [hive, taken, oryx, og-raid, exotic-scout, touch-of-malice, deepsight-puzzle]

average_clear_time:
  normal_experienced: "60-90 min"
  normal_learning:    "2.5-4 hr"

# ========================================================================
overview:
  abstract: |
    Bungie's flagship D1 raid, reprised in D2 (2022). Multi-encounter
    Hive epic culminating in Oryx, the Taken King. Heavy on Brand-of-X
    mechanics (Deathsinger's Power, Brand of the Initiate, Aura of
    Immortality) + plate sync sequences. Source of Touch of Malice
    (exotic scout) + Doom of Chelchis (scout) + classic legendaries.

  bosses:
    - name: "Warpriest"
      encounter: 4
      role: "First major boss — glyph plate sequence + Brand of the Initiate"
    - name: "Golgoroth"
      encounter: 5
      role: "Hive Ogre boss — gaze swap + Pool of Reclaimed Light + Unstable Light"
    - name: "Daughters of Oryx (Ir Anûk + Ir Halak)"
      encounter: 7
      role: "Twin Wizard bosses — Torn Between Dimensions + Brand Claimer"
    - name: "Oryx, the Taken King"
      encounter: 8
      role: "Final boss — Light-Eater Ogres + Vessel + Aura of Immortality + corrupted Light + chest weakpoint"

  recurring_mechanics:
    - name: "Brand mechanics"
      brief: |
        Multiple Brands across the raid: Deathsinger's Power (Basilica),
        Brand of the Initiate (Warpriest), Brand stealing via Brand Claimer
        (Warpriest+Daughters), Aura of Immortality (Oryx). Each has a
        death timer + transfer mechanic.

    - name: "Brand Claimer (D2 specific)"
      brief: |
        Kill specific enemies (Blightguard Taken Knight, Hive Wizard) to
        drop a Brand Claimer buff. Hold up to 30s, interact with another
        Brand-holder to STEAL their Brand + transfer the timer reset.

    - name: "Annihilator Totems"
      brief: |
        Pillars that consume Light if not pacified by player presence.
        Basilica encounter only. Stand under to prevent wipe.

    - name: "Oracles"
      brief: |
        Glowing Hive constructs in Warpriest + Daughters encounters.
        Different rules than VoG (no musical-note order); destroy
        via positional inputs.

    - name: "Corrupted Light (Oryx fight)"
      brief: |
        Dropped by Light-Eater Ogres on death. Standing in Corrupted
        Light + having Aura of Immortality = stuns Oryx + reveals chest
        weak point.

  role_archetypes:
    - id: brand_holder
      brief: "Carries a Brand (Deathsinger's, Initiate, Aura). Must know its rules."
    - id: brand_claimer
      brief: "Hunts specific enemies for Claimer buff; relieves Brand holder."
    - id: plate_steward
      brief: "Holds an assigned plate (Warpriest glyph, Threshold, Oryx)."
    - id: relic_runner
      brief: "Hall of Souls Relic carrier."
    - id: gaze_holder
      brief: "Golgoroth gaze taker."

  sherpa_playbook:
    - "Pre-pull: assign plates (Warpriest: L/M/R), brand claimers (Daughters/Oryx)."
    - "Touch of Malice: exotic scout drops from Oryx (random chance). Save Spoils for re-rolls."
    - "Deepsight puzzle: 9 runes hidden across the raid (see notes). Shoot all → bonus crafted-drop chest after Oryx."
    - "Solo: extremely rare. Daughters + Oryx specifically require Brand mechanics — solo flawless is endgame-tier."

  loadout_general:
    weapons:
      - "Long-range scout / sniper for Hobgoblins / Boomers."
      - "Burst DPS for Warpriest, Golgoroth, Oryx (Whisper, Sleeper, Linear)."
      - "Touch of Malice itself for Oryx DPS (synergistic with its perk)."
    armor_stats:
      - "Resilience for Hive AoE damage."
      - "Mobility for Transept jumping puzzle."
    common_exotics:
      - "Hunter: Celestial Nighthawk (Oryx chest), Star-Eater (DPS)."
      - "Titan: Cuirass of the Falling Star, Heart of Inmost Light."
      - "Warlock: Well of Radiance (mandatory for DPS), Phoenix Protocol."

  common_mistakes:
    - "Basilica: Brand holder caught off the totem = wipe."
    - "Warpriest: missed glyph sequence call = Oculus wipe."
    - "Golgoroth: gaze holder dies in pool = stack of Unstable Light wasted."
    - "Daughters: wrong daughter's Brand stolen = wrong DPS target = wipe."
    - "Oryx: forgetting to stand in Aura of Immortality during Corrupted Light detonation = wipe."
    - "Master: not bringing Anti-Champion mods for Barrier Knights + Overload Hobgoblins."

# ========================================================================
encounters:

  - order: 1
    slug: hall-of-souls
    name: "Hall of Souls (Opener)"
    difficulty: easy
    estimated_time: "10-15 min"

    abstract: |
      Opener. Split 3 teams of 2. Two pickup Relics ("Tomb Husks") and
      deposit at statues. Gunner + Relic-holder per side. 6 statues
      total via 3 rounds of double-deposit.

    setup: |
      WHAT YOU SEE:
      - Court of Oryx-style hall with a central blocked gate.
      - Statues at multiple positions (6 total need activation).
      - Tomb Husks (relics) at start.
      - Taken Blight in center (D2: shoot to break walls blocking Relic carriers).

      PLATFORM MECHANICS:
      - Pick up Relic = Tomb Husk → carry to statue, INTERACT to slam.
      - 2 relics must be deposited at near-same time (or first statue silences).
      - Gunner clears path for Relic carrier.

      START STATE: rally banner, pick up Relics.

    callouts:
      - when: "Statue active"
        from: "depositor"
        to:   "team"
        say:  '"Statue [N] DOWN."'
        why:  "Sync deposits."

    wipe_triggers: []
    damage_phase_triggers:
      - "All 6 statues active → portal opens → loot chest."

    parallel_timeline:
      - phase: "Pull"
        relic_carriers_2: "Pick up Tomb Husks."
        gunners_2: "Lead Relic carriers."
        center_clear_2: "Burst enemies in center to break central gate."
      - phase: "Cycle (×3, 6 statues total)"
        carriers: "Walk to statues, double-deposit."

    permutations:
      - name: "Standard 3-pair split"
        learner_friendly: true
        summary: "L/center/R 3 pairs. Each round, 2 pairs cover left+right Relic + 1 pair holds center."
        roles:
          - id: relic_pair
            count: 4
            does: "2 pairs Relic-carry + gunner."
          - id: center_clear
            count: 2
            does: "Burst Court enemies."

    cheese: []
    common_mistakes:
      - "Slow double-deposit — first statue silences if late."

    rewards:
      guaranteed:
        - "Chest with Doom of Chelchis or class item"
      hidden_chest: null
      potential_drops:
        - "Doom of Chelchis (scout)"
      # Deepsight Rune #1 + #2 located in this area — see Overall Notes

    images:
      overview: ""
      setup: ""

    learner_path:
      - "1st: gunner. 2nd: Relic carrier."

