  # ====================================================================

  - order: 8
    slug: oryx
    name: "Oryx, the Taken King (final boss)"
    difficulty: hard
    estimated_time: "30-45 min"

    abstract: |
      Final boss. 5 platform rotations (Light-Eater Ogres spawn in spawn
      order = platform order). Kill Ogres (+ Light-Eater Knights eat orbs
      if alive!) → Vessel of Oryx with Aura of Immortality spawns. Torn
      player gets Aura. Detonate Corrupted Light in Aura = stun Oryx +
      chest weak point. 4 detonations = max stun. Then burst chest. Final
      stand at low HP.

    setup: |
      WHAT YOU SEE:
      - Throne room of Oryx. 4 corner platforms + center area.
      - Oryx (massive Taken Hive King) far back.
      - Black orb at end — approach to start.

      PLATFORM MECHANICS:
      - 5 platform rotations per phase (rotation = which 4 corners spawn).
        • Phase 1: Front Right or Front Left
        • Phase 2: Back Left or Back Right
        • Phase 3: Front Left or Front Right
        • Phase 4: Front Left or Front Right
        • Phase 5: Back Left or Back Right
      - Light-Eater Ogres spawn at 4 corner platforms in order.
      - 2 players on platforms (one becomes Torn).
      - Add-clear team kills Ogres in spawn order. KILL Light-Eater Knights too — they EAT Corrupted Light orbs if not killed.
      - Killed Ogre drops Corrupted Light orb at platform.
      - Torn player picks up Relic at center → steals Aura of Immortality from Vessel of Oryx (special Knight) → kill Vessel.
      - Vessel down: platform players stand in Aura. Then run to Corrupted Light orbs at their platforms → DETONATE.
      - 4 detonations max = max stun. Failure = wipe.
      - Stun reveals Oryx's CHEST weak point — burst all weapons.
      - After 5 platform phases, 50% HP → Blight phase: Oryx sucks players into Shade-Blight. Hammer Shade. Health doesn't replenish. Once Shade dies = phase over.
      - Final stand: Oryx walks to front, chest exposed. All-in DPS.

      START STATE: rally banner. Walk to black orb to start.

    callouts:
      - when: "Ogre spawn"
        from: "spotter"
        to:   "team"
        say:  '"OGRE [Front-L/F-R/B-L/B-R] — burn!"'
        why:  "Spawn order tells platform sequence."
      - when: "Vessel up"
        from: "spotter"
        to:   "team"
        say:  '"VESSEL [direction] — Aura steal."'
        why:  "Torn player goes to Vessel."
      - when: "Light-Eater Knight"
        from: "spotter"
        to:   "team"
        say:  '"LIGHT-EATER KNIGHT [direction] — KILL IT (eats orbs)."'
        why:  "Knight will eat Corrupted Light if alive."
      - when: "Aura stolen"
        from: "torn"
        to:   "team"
        say:  '"AURA — stay center."'
        why:  "Aura player STATIC at center. Others detonate around."
      - when: "Detonating"
        from: "platform player"
        to:   "team"
        say:  '"[name] DETONATING [direction]."'
        why:  "Stagger detonations or sync for max stun."
      - when: "Oryx stunned, chest weak point"
        from: "any"
        to:   "team"
        say:  '"CHEST OPEN — burn!"'
        why:  "DPS window. Whisper / Sleeper / Linear / Celestial."
      - when: "Blight phase"
        from: "any"
        to:   "team"
        say:  '"BLIGHT — Shade!"'
        why:  "Burst Shade of Oryx in Blight realm."

    wipe_triggers:
      - "Failure to detonate Corrupted Light in Aura = wipe."
      - "Light-Eater Knight eats orb = wasted detonation."
      - "Shade of Oryx not killed in Blight phase."
      - "Oryx enrages (5 platform phases without sufficient damage)."

    damage_phase_triggers:
      - "Oryx stunned by Corrupted Light detonations (in Aura) → chest weak point exposed → DPS."
      - "Final stand: chest exposed continuously."

    parallel_timeline:
      - phase: "Pull"
        all: "Approach black orb. Oryx spawns. 2 on first platform corner."
      - phase: "Ogre phase (~0:30-1:30)"
        platform_players_2: "Stand on platforms in spawn order."
        add_clear_2: "Kill Ogres + Light-Eater Knights."
        torn: "Steal Aura from Vessel of Oryx."
      - phase: "Detonate Corrupted Light (~1:30-2:00)"
        platform_players: "Walk to platform orbs, detonate. Stagger or sync."
        aura_holder: "Stay center, all team in Aura range."
      - phase: "DPS (~2:00-2:20)"
        all: "Burst Oryx's chest."
      - phase: "Reset / Next platform rotation"
        all: "Cycle 5 platform rotations total before 50%."
      - phase: "Blight phase (~3:00)"
        all: "Pulled into Blight. Burst Shade of Oryx. Watch for adds."
      - phase: "Final stand"
        all: "Oryx at front. All-in DPS."

    permutations:
      - name: "Standard 4-platform / 2-clear"
        learner_friendly: true
        summary: "4 dedicated platform players (1 per corner); 2 add-clear (Ogres + Knights)."
        roles:
          - id: platform_player
            count: 4
            does: "Stand on assigned corner platform. Detonate Corrupted Light."
          - id: add_clear
            count: 2
            does: "Kill Ogres in order. KILL Light-Eater Knights ASAP."
          # torn player = randomly chosen from platform_player + add_clear

      - name: "Speed: Celestial Nighthawk chest one-shot"
        learner_friendly: false
        summary: |
          Hunter with Celestial Nighthawk + Star-Eater Scales fires Super
          into Oryx's chest = massive damage. Touch of Malice helps too.
          1-2 phase clears.
        best_for: "Endgame teams + Touch of Malice farmers."

      - name: "Master: Hands Off"
        learner_friendly: false
        summary: "Each Light-Eater Ogre/Knight can only be killed by a given player ONCE. Rotate killers."

    cheese: []

    common_mistakes:
