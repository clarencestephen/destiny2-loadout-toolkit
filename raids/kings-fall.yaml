# ========================================================================
overall_notes:
  - "Touch of Malice exotic scout: ~5% chance from Oryx, can re-roll via Spoils of Conquest. Catalyst from raid challenges."
  - "Deepsight Puzzle: 9 runes hidden across the raid. Shoot all in a single run → bonus chest with guaranteed Deepsight Resonant (craftable) raid weapon after Oryx kill."
  - "Rune locations:"
  - "  1. Under platform at start, before first portal."
  - "  2. On top of threshold leading to Hidden Chest 1 (Portico)."
  - "  3. Wall behind LEFT Annihilator Totem (Basilica)."
  - "  4. Platform above rally flag in Warpriest room (jumping pre-encounter)."
  - "  5. Inside the hole at end of Golgoroth's Cellar."
  - "  6. Under rally flag in Daughters room."
  - "  7. Next to Hidden Chest 2 (Transept), on its left."
  - "  8. Looking up at threshold after the wall-pillar section."
  - "  9. After entering doorway to final 2 encounters, turn around from where rally flag would spawn."
  - "Master: Champions (Barrier Knights, Overload Hobgoblins, Unstoppable Ogres/Phalanxes)."
  - "Challenges (master mode): The Grass is Always Greener (Basilica), Devious Thievery (Warpriest), Gaze Amaze (Golgoroth), Under Construction (Daughters), Hands Off (Oryx)."
  - "Soloing: Daughters + Oryx require Brand mechanics that aren't bypassable. Solo flawless = endgame-tier achievement."
