  # ====================================================================

  - order: 3
    slug: basilica
    name: "Basilica (Annihilator Totems)"
    difficulty: medium
    estimated_time: "15-25 min"

    abstract: |
      Two side rooms with Annihilator Totems (deplete Light if unattended).
      Two Brand-holders pick up Brand of the Weaver (L) + Brand of the
      Unraveler (R). Build Deathsinger's Power stacks (10) via kills, deposit
      at center plate. D2: Brand Claimer mechanic — kill Wizard + Blightguard
      to relieve the Brand holder. 10 power required per side.

    setup: |
      WHAT YOU SEE:
      - 3 rooms: L (Weaver), Center (deposit plate + door), R (Unraveler).
      - Annihilator Totem in each side room.
      - Brand pickup at L + R Brand spawn points.
      - Hive Wizards + Blightguard Taken Knights on side balconies (Brand Claimer drops).
      - Unstoppable Ogre spawns from pool in front of center deposit plate.

      PLATFORM MECHANICS:
      - Brand of the Weaver (L) + Brand of the Unraveler (R) picked up.
      - Brand holder MUST stand under Totem (or it depletes → wipe).
      - Kills while Branded = Deathsinger's Power stacks (Minor=1, Elite=2).
      - 10 stacks → deposit at center plate. (Can't pickup Brand Claimer while holding stacks.)
      - To transfer Brand: kill Wizard → kill Blightguard → grab Brand Claimer buff (30s timer) → return to Brand holder → interact = steal.
      - Brand holder dies if timer expires without transfer (loses all stacks).

      START STATE: rally banner. Split L/M/R 2-2-2.

    callouts:
      - when: "Brand picked up"
        from: "holder"
        to:   "team"
        say:  '"BRANDED [L/R] — totem."'
        why:  "Holder commits to totem position."
      - when: "Wizard down"
        from: "killer"
        to:   "team"
        say:  '"Wizard down — Blightguard up."'
        why:  "Cue Claimer pipeline."
      - when: "Blightguard down + Claimer in hand"
        from: "claimer"
        to:   "team"
        say:  '"CLAIMER [L/R] — relieving."'
        why:  "Brand holder prepares for swap."
      - when: "Stacks transferred + deposited"
        from: "self"
        to:   "team"
        say:  '"10 in — [L/R] door progress."'
        why:  "Progress check."
      - when: "Brand timer low"
        from: "holder"
        to:   "team"
        say:  '"TIMER LOW — relieve!"'
        why:  "Urgent swap needed."

    wipe_triggers:
      - "Annihilator Totem unattended too long = Light drained = wipe."
      - "Brand holder dies (timer or damage) = wipe risk."
      - "Failure to deposit 10 power each side."

    damage_phase_triggers:
      - "10 Deathsinger's Power deposited at both L + R doors → Warpriest deems team worthy = encounter ends."

    parallel_timeline:
      - phase: "Pull"
        all: "Split L/M/R."
      - phase: "Per side"
        brand_holder: "Stand totem, kill for stacks."
        claimer: "Kill Wizard + Blightguard, get Claimer."
        depositor: "Carry stacks to center plate, deposit."
      - phase: "10 power per side"
        all: "Cycle until both sides complete."

    permutations:
      - name: "Standard 2 per side"
        learner_friendly: true
        summary: "2 per side: 1 totem, 1 claimer. M is shared between L+R as depositors."
        roles:
          - id: brand_holder
            count: 2
            does: "Stand totem, build stacks, deposit."
          - id: brand_claimer
            count: 2
            does: "Hunt Wizard + Blightguard, get Claimer, relieve holder."
          - id: center_clear
            count: 2
            does: "Suppress Unstoppable Ogre + center adds; backup roles."

      - name: "Master: Devious Thievery"
        learner_friendly: false
        summary: "Holder cannot hold Brand > 5s during transfer. Coordinate tight."

    cheese: []

    common_mistakes:
      - "Forgetting to KILL Wizard BEFORE Blightguard — Claimer doesn't spawn."
      - "Holding stacks while trying to Claimer-pickup — 'Brand Denied'."
      - "Totem unattended during transfer chaos."

    rewards:
      guaranteed:
        - "1× raid weapon or armor"
      hidden_chest: null
      potential_drops:
        - "Anguish of Drystan (auto)"
        - "Doom of Chelchis (scout)"
        - "Elulim's Frenzy (rocket)"
        - "King's Fall armor"
      # Deepsight Rune #3 in this area — see Overall Notes

    images:
      overview: ""
      setup: ""
      callouts: ""

    learner_path:
      - "1st: center_clear."
      - "2nd: brand_holder."
      - "3rd: brand_claimer."

  # ====================================================================

  - order: 4
    slug: warpriest
    name: "Warpriest"
    difficulty: hard
    estimated_time: "20-30 min"

    abstract: |
      First major boss. 3 plates (L/M/R). After clearing adds + Hallowed
      Knights, a GLYPH SEQUENCE starts (which plate first → glow on
      Monolith back). Step plates in sequence → last stepper gets Brand
      of the Initiate (DPS aura). DPS Warpriest. Brand expires after 5
      stacks → Brand Claimer swap. End-of-DPS: hide behind a Monolith
      from Oculus or die.

    setup: |
      WHAT YOU SEE:
      - 3 plates (L/M/R) facing 3 Monoliths (the hide-from-Oculus pillars).
      - Warpriest on a far balcony (Hive Boomer Knight).
      - Adds: Blistered Wizards + Revenant Knights (Hive) then Servile Minotaurs + Boomer Knights (Taken at 50%).

      PLATFORM MECHANICS:
      - 3 plates stepped simultaneously = Warpriest spawns + immune.
      - Adds: kill Hallowed Knights (signaled by yell when Adept Acolytes die).
      - Glyph sequence: Monolith back GLOWS WHITE = that side first.
        • Middle plate stepper checks L+R Monoliths — if either glowing, that side first.
        • If neither, middle first.
        • Sequence: 3 plates step in order.
      - Last stepper = Brand of the Initiate (red aura). Anyone in aura = damages Warpriest.
      - Brand reaches ~3s timer (5 stacks) → kill add or Brand transfers via Brand Claimer.
      - Brand Claimer: kill Blightguard (during DPS phase) → grab buff → claim before Brand expires.
      - 2 successful claims per phase → Warpriest summons Oculus → hide behind a Monolith or wipe.
      - Each surviving Monolith gives Warpriest a Taken ability for next phase.
      - 4 DPS phases without kill = wipe (Oculus persistent after Enrage).

      START STATE: rally banner. 3 plates simultaneous to start.

    callouts:
      - when: "All 3 plates stepped"
        from: "any"
        to:   "team"
        say:  '"WARPRIEST UP — clearing adds."'
        why:  "Pre-glyph state."
      - when: "Hallowed Knights spawning"
        from: "spotter"
        to:   "team"
        say:  '"Hallowed Knights — burn 3 quick."'
        why:  "Clears for glyph phase."
      - when: "Glyph sequence triggered"
        from: "middle stepper"
        to:   "team"
        say:  '"GLYPHS — [L/M/R] first, [direction] second, [direction] third."'
        why:  "Critical sequence."
      - when: "Brand acquired"
        from: "holder"
        to:   "team"
        say:  '"INITIATE — stacking on me."'
        why:  "Team converges in aura."
      - when: "Brand low (5s)"
        from: "holder"
        to:   "team"
        say:  '"5 SECONDS — Claimer!"'
        why:  "Claimer-pickup window."
      - when: "Oculus incoming"
        from: "any"
        to:   "team"
        say:  '"OCULUS — MONOLITH!"'
        why:  "Hide or die."
      - when: "Final stand"
        from: "any"
        to:   "team"
        say:  '"FINAL — burn!"'
        why:  "Push through."

    wipe_triggers:
      - "Failed glyph sequence too many times."
      - "Oculus exposure — not behind a Monolith."
      - "Brand expires without successful Claim AND no Oculus survivors."
      - "4 DPS phases without kill = enrage."

    damage_phase_triggers:
      - "Brand of the Initiate held by last plate stepper → red aura → ~30s damage window per phase."

    parallel_timeline:
      - phase: "Pull"
        all: "3 plates step simultaneously."
      - phase: "Add clear"
        all: "Burst adds + Hallowed Knights."
      - phase: "Glyph sequence (~0:30 in)"
        middle_stepper: "Check Monoliths, call order."
        steppers_2: "Step on call."
        last_stepper: "Step last → Brand."
      - phase: "DPS (~30s)"
        brand_holder: "Aura center. Burst Warpriest with team in red zone."
        claimers_2: "Kill Blightguard, prep Claimer buff."
      - phase: "Brand swap"
        claimer_1: "Take Brand from holder at ~5s."
      - phase: "Reset / Oculus"
        all: "Hide behind Monolith. Cycle."

    permutations:
      - name: "Standard 3-plate / 2-claimer"
        learner_friendly: true
        summary: "3 dedicated plate steppers; 2 dedicated Claimers; 1 floater."
        roles:
          - id: plate_stepper
            count: 3
            does: "Always on a specific plate (L/M/R). Step on glyph call. Last stepper = Brand."
          - id: brand_claimer
            count: 2
            does: "Hunt Blightguard, get Claimer, relieve Brand holder."
          - id: floater
            count: 1
            does: "Add-clear + backup Claimer."

      - name: "Master: Devious Thievery"
        learner_friendly: false
        summary: "Brand Claimer cannot be held > 5s. Holder MOVES toward Claimer."

    cheese: []

    common_mistakes:
      - "Middle stepper fails to identify glowing Monolith — sequence wrong."
      - "Brand holder runs out of aura — team loses DPS window."
      - "Claimer holds buff too long — Brand expires."

    rewards:
      guaranteed:
        - "1× raid weapon or armor"
      hidden_chest: null
      potential_drops:
        - "Defiance of Yasmin (sniper)"
        - "Midha's Reckoning (fusion)"
        - "King's Fall armor"
      # Deepsight Rune #4 in this area

    images:
      overview: ""
      setup: ""
      callouts: ""
      damage_phase: ""

    learner_path:
      - "1st: plate_stepper (specific side)."
      - "2nd: floater / Claimer."
      - "3rd: middle plate (calls glyph sequence)."

  # ====================================================================

  - order: 5
    slug: golgoroth
    name: "Golgoroth"
    difficulty: hard
    estimated_time: "20-30 min"

    abstract: |
      Hive Ogre boss in a cellar. Mechanics: capture Gaze (shoot back),
      shoot down Pool of Reclaimed Light orbs from ceiling, stand in pool
      while another player captures Gaze, burst Golgoroth's chest. Unstable
      Light explosions detonate near Golgoroth for huge damage. 6 orbs total.

    setup: |
      WHAT YOU SEE:
      - Cavern arena with Golgoroth (massive Hive Ogre) in the back.
      - 6 orbs hanging from ceiling (Pool of Reclaimed Light sources).
      - Tablet of Ruin (Soulsiphon Plinth) at front — fills on lost gaze or death.
      - Upper platform near front.
      - Lower level with Taken Phalanxes that push.

      PLATFORM MECHANICS:
      - Start: shoot starting orb above Golgoroth.
      - Capture Gaze: shoot Golgoroth in the BACK enough = Gaze captured (3-min duration).
        Gaze holder takes Golgoroth's aggro + stomach reveals weak point.
      - Shoot a ceiling orb to spawn Pool of Reclaimed Light below.
      - Stand in Pool = massive damage buff.
      - Fireteam in pool shoots Golgoroth's chest.
      - Pool spawning pattern (D2): L → R → L → R → L → R, toward Tablet of Ruin.
      - Unstable Light debuff: random player in pool gets it. Timer expires → explosion. Run toward Golgoroth + detonate near him = huge damage.
      - Lose gaze = +1 glyph on Tablet of Ruin. 6 glyphs = wipe.
      - 6 orbs exhausted = Golgoroth "grows tired" → add wave → cycle repeats.

      START STATE: shoot the starting orb to start.

    callouts:
      - when: "Gaze captured"
        from: "holder"
        to:   "team"
        say:  '"GAZE — orb [L/R]."'
        why:  "Team shoots indicated ceiling orb."
      - when: "Pool active"
        from: "any"
        to:   "team"
        say:  '"POOL [L/R] — in!"'
        why:  "Team enters pool for DPS."
      - when: "Gaze timer low"
        from: "current holder"
        to:   "team"
        say:  '"GAZE LOW — back swap!"'
        why:  "Backup player captures Gaze from opposite position."
      - when: "Unstable Light"
        from: "self"
        to:   "team"
        say:  '"UNSTABLE — Golgoroth bomb!"'
        why:  "Move toward Golgoroth, detonate close."

    wipe_triggers:
      - "Tablet of Ruin fills (6 lost-gaze glyphs)."
      - "Golgoroth enrage."
      - "Unstable Light detonation in team cluster."

    damage_phase_triggers:
      - "Pool active + Gaze captured + chest visible → DPS window (per gaze cycle)."

    parallel_timeline:
      - phase: "Pull"
        all: "Shoot starting orb. Engage Hive adds."
      - phase: "First gaze"
        gaze_holder_1: "Shoot Golgoroth's back, capture Gaze."
        pool_shooters: "Shoot ceiling orb #1."
      - phase: "DPS cycle"
        gaze_holder: "Hold position behind team (opposite side from pool)."
        team: "Stand in pool, shoot chest."
      - phase: "Gaze swap"
        gaze_holder_2: "Stand diagonally opposite, capture next gaze."
      - phase: "Repeat ×6 orbs"
        all: "Cycle until Golgoroth dies or grows tired."

    permutations:
      - name: "Standard 2-gaze swap"
        learner_friendly: true
        summary: "Two designated gaze holders alternate. 4 DPS in pool."
        roles:
          - id: gaze_holder
            count: 2
            does: "Alternate capturing Gaze. Stand opposite the pool."
          - id: pool_dps
            count: 4
            does: "Stand in pool, shoot chest. Detonate Unstable Light at Golgoroth."

      - name: "Master: Gaze Amaze"
        learner_friendly: false
        summary: "Current gaze holder must be IN the pool when partner relieves."

    cheese: []

    common_mistakes:
      - "Standing in pool when gaze swap happens — Unstable Light wipes team."
      - "Forgetting to shoot ceiling orb in correct sequence (L/R/L/R/L/R)."
      - "Unstable Light detonation on team = wipe."

    rewards:
      guaranteed:
        - "1× raid weapon or armor"
      hidden_chest: null
      potential_drops:
        - "Qullim's Terminus (LMG)"
        - "Defiance of Yasmin (sniper)"
        - "King's Fall armor"
      # Deepsight Rune #5 in Golgoroth's Cellar exit

    images:
      overview: ""
      setup: ""
      callouts: ""
      damage_phase: ""

    learner_path:
      - "1st: pool_dps."
      - "2nd: gaze_holder."

